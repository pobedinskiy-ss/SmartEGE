<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SmartЕГЭ — экзамен, избранное, статистика + тренировка по темам и ошибки</title>

  <style>
    /* =========================================================
      SmartЕГЭ — полная версия с тренировкой и ошибками
      Все оригинальные стили сохранены.
      Добавлены явные цвета для тёмной темы.
    ========================================================== */

    :root{
      --bg: #f2f4f7;
      --surface: #ffffff;
      --surface-2: #f7f8fb;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #3b82f6;
      --brand-2: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --shadow: 0 10px 30px rgba(15, 23, 42, .12);
      --shadow-soft: 0 6px 18px rgba(15, 23, 42, .08);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --border: rgba(15, 23, 42, .10);
      --tap: 48px;
      --phone-w: 410px;
      --header-h: 64px;
      --tabbar-h: 76px;
      --safe: 14px;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, "Apple Color Emoji","Segoe UI Emoji";
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    body.theme-dark{
      --bg: #0b1220;
      --surface: #0f172a;
      --surface-2: #111c33;
      --text: #e5eaf5;
      --muted: #9aa6c0;
      --brand: #60a5fa;
      --brand-2: #3b82f6;
      --border: rgba(229, 234, 245, .12);
      --shadow: 0 12px 34px rgba(0, 0, 0, .35);
      --shadow-soft: 0 8px 22px rgba(0, 0, 0, .28);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background: var(--bg);
    }

    .desk{
      min-height:100%;
      display:grid;
      place-items:center;
      padding: 28px 16px;
      background:
        radial-gradient(1200px 900px at 20% 10%, rgba(59,130,246,.16), transparent 45%),
        radial-gradient(900px 700px at 85% 20%, rgba(16,185,129,.10), transparent 45%),
        radial-gradient(1100px 900px at 50% 85%, rgba(234,179,8,.08), transparent 40%),
        linear-gradient(180deg, #cbd5e1 0%, #e5e7eb 35%, #dbeafe 100%);
    }
    body.theme-dark .desk{
      background:
        radial-gradient(1200px 900px at 20% 10%, rgba(96,165,250,.18), transparent 45%),
        radial-gradient(900px 700px at 85% 20%, rgba(16,185,129,.10), transparent 45%),
        radial-gradient(1100px 900px at 50% 85%, rgba(234,179,8,.07), transparent 40%),
        linear-gradient(180deg, #0b1220 0%, #07101f 45%, #070b14 100%);
    }

    .phone{
      width: min(var(--phone-w), 92vw);
      height: min(860px, 92vh);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
      display:flex;
      flex-direction:column;
    }
    .phone::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:26px;
      border:1px solid rgba(255,255,255,.06);
      pointer-events:none;
    }

    header.app-header{
      height: var(--header-h);
      display:grid;
      grid-template-columns: 46px 1fr 46px;
      align-items:center;
      padding: 0 calc(var(--safe) + 6px);
      gap: 10px;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      border-bottom: 1px solid var(--border);
      position:relative;
      z-index: 5;
      flex-shrink:0;
    }
    .header-title{
      text-align:center;
      font-weight: 800;
      letter-spacing: .2px;
      font-size: 16px;
      line-height: 1.1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      user-select:none;
    }
    .header-sub{
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 600;
    }
    .header-stack{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-width:0;
    }

    .icon-btn{
      height: 42px;
      width: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      box-shadow: var(--shadow-soft);
      display:grid;
      place-items:center;
      cursor:pointer;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
      user-select:none;
      color: var(--text);
    }
    .icon-btn:active{ transform: scale(.97); }
    .icon{
      width: 20px;
      height: 20px;
      display:block;
      stroke: currentColor;
    }

    .badge{
      position:absolute;
      top: 10px;
      right: 12px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--danger);
      color:#fff;
      font-size: 11px;
      font-weight: 800;
      display:grid;
      place-items:center;
      border: 2px solid var(--surface);
      box-shadow: 0 6px 14px rgba(220,38,38,.25);
    }

    main{
      flex:1;
      overflow:auto;
      padding: 14px var(--safe) calc(var(--tabbar-h) + 16px);
      background:
        radial-gradient(900px 400px at 50% 0%, rgba(59,130,246,.08), transparent 45%),
        linear-gradient(180deg, color-mix(in srgb, var(--surface) 96%, transparent), var(--surface));
    }

    nav.tabbar{
      height: var(--tabbar-h);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      border-top: 1px solid var(--border);
      padding: 8px 10px 12px;
      display:grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1px;
      position:absolute;
      left:0; right:0; bottom:0;
      z-index: 6;
      backdrop-filter: blur(10px);
      flex-shrink:0;
    }
    .tab{
      height: 56px;
      border-radius: 14px;
      border: 1px solid transparent;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap: 1px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
      color: var(--muted);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .1px;
    }
    .tab:hover{ background: color-mix(in srgb, var(--surface-2) 70%, transparent); }
    .tab:active{ transform: scale(.98); }
    .tab.active{
      background: color-mix(in srgb, var(--brand) 16%, var(--surface));
      border-color: color-mix(in srgb, var(--brand) 30%, var(--border));
      color: var(--text);
    }
    .tab .tab-ico{ font-size: 18px; line-height: 1; }
    .tab .tab-label{ font-size: 8px; font-weight: 800; letter-spacing: .1px; }

    .card{
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
    }
    .card.pad{ padding: 14px; }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .muted{ color: var(--muted); }
    .btn{
      height: var(--tap);
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      font-weight: 900;
      letter-spacing: .2px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
      user-select:none;
      color: var(--text);
    }
    .btn:active{ transform: scale(.98); }
    .btn.primary{
      background: linear-gradient(180deg, var(--brand), var(--brand-2));
      border-color: rgba(255,255,255,.12);
      color:#fff;
      box-shadow: 0 12px 22px rgba(37,99,235,.25);
    }
    .btn.ghost{
      background: transparent;
      border-color: color-mix(in srgb, var(--border) 95%, transparent);
    }
    .btn.full{ width:100%; }
    .btn.small{ height: 36px; font-size: 12px; padding: 0 10px; }

    .chip{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface-2) 70%, transparent);
      font-size: 12px;
      font-weight: 800;
      color: var(--text);
      white-space:nowrap;
    }
    .chip.ok{ color: var(--success); border-color: color-mix(in srgb, var(--success) 22%, var(--border)); background: color-mix(in srgb, var(--success) 10%, var(--surface)); }
    .chip.warn{ color: #b45309; border-color: color-mix(in srgb, #f59e0b 22%, var(--border)); background: color-mix(in srgb, #f59e0b 10%, var(--surface)); }
    .chip.bad{ color: var(--danger); border-color: color-mix(in srgb, var(--danger) 22%, var(--border)); background: color-mix(in srgb, var(--danger) 10%, var(--surface)); }
    .chip.active{
      background: var(--brand);
      color: #fff;
      border-color: var(--brand-2);
    }
    .chip.fav{
      background: #fef9c3;
      color: #854d0e;
      border-color: #fde047;
    }

    .section-title{
      font-size: 14px;
      font-weight: 1000;
      letter-spacing: .2px;
      margin: 14px 4px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .center{
      min-height: calc(100% - 10px);
      display:grid;
      place-items:center;
      padding: 20px 8px;
    }
    .hero{
      width: 100%;
      max-width: 360px;
      padding: 18px;
    }
    .brand-badge{
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(180deg, var(--brand), var(--brand-2));
      display:grid;
      place-items:center;
      color:#fff;
      box-shadow: 0 14px 26px rgba(37,99,235,.25);
      margin-bottom: 12px;
    }
    .hero h1{
      margin: 0 0 6px 0;
      font-size: 20px;
      letter-spacing: .2px;
    }
    .hero p{
      margin: 0 0 14px 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 13px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .subject{
      padding: 14px;
      cursor:pointer;
      transition: transform .12s ease, border-color .2s ease, background .2s ease;
      user-select:none;
      position:relative;
      overflow:hidden;
    }
    .subject:active{ transform: scale(.985); }
    .subject:hover{ border-color: color-mix(in srgb, var(--brand) 22%, var(--border)); }
    .subject .s-ico{
      width: 44px; height: 44px;
      border-radius: 16px;
      display:grid;
      place-items:center;
      background: color-mix(in srgb, var(--brand) 14%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--brand) 24%, var(--border));
      margin-bottom: 10px;
    }
    .subject .name{ font-weight: 1000; letter-spacing:.2px; }
    .subject .pct{ margin-top: 4px; font-weight: 800; color: var(--muted); font-size: 12px; }
    .bar{
      height: 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--border) 50%, transparent);
      overflow:hidden;
      margin-top: 10px;
    }
    .bar > i{
      display:block;
      height:100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      border-radius: 999px;
      transition: width .5s ease;
    }

    .seg{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 6px;
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface-2) 70%, transparent);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      margin-bottom: 12px;
    }
    .seg button{
      height: 42px;
      border-radius: 14px;
      border: 1px solid transparent;
      background: transparent;
      font-weight: 1000;
      cursor:pointer;
      color: var(--muted);
      transition: background .2s ease, transform .12s ease, border-color .2s ease;
    }
    .seg button:active{ transform: scale(.99); }
    .seg button.active{
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }

    .theme-scroll{
      display:flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 2px 16px;
      margin-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .theme-scroll .chip{
      flex-shrink:0;
      cursor:pointer;
    }

    .acc{
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .acc-item{
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      overflow:hidden;
    }
    .acc-head{
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      cursor:pointer;
      user-select:none;
    }
    .acc-head strong{ font-weight: 1000; font-size: 13px; }
    .acc-head span{ color: var(--muted); font-size: 12px; font-weight: 800; }
    .acc-body{
      max-height: 0px;
      overflow:hidden;
      transition: max-height .28s ease;
      border-top: 1px solid transparent;
    }
    .acc-item.open .acc-body{
      border-top-color: var(--border);
      max-height: 800px;
    }
    .acc-body ul{
      margin: 0;
      padding: 10px 16px 12px 28px;
      color: var(--muted);
      line-height: 1.35;
      font-weight: 650;
      font-size: 13px;
    }
    .acc-body .theory-text{
      padding: 10px 16px 12px 16px;
      color: var(--text);
      line-height: 1.5;
      font-weight: 500;
      font-size: 13px;
      border-top: 1px dashed var(--border);
      background: var(--surface-2);
    }
    .theory-text b, .theory-text strong { font-weight: 800; color: var(--text); }
    .theory-text ul { margin: 8px 0; padding-left: 20px; }
    .theory-text li { margin: 4px 0; }

    .list{
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .task{
      padding: 12px 14px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, border-color .2s ease;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .task:active{ transform: scale(.99); }
    .task:hover{ border-color: color-mix(in srgb, var(--brand) 22%, var(--border)); }
    .task .t-title{ font-weight: 1000; font-size: 13px; }
    .task .t-sub{ color: var(--muted); font-weight: 800; font-size: 12px; margin-top: 3px; }
    .task .meta{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap: 6px;
      min-width: 92px;
    }
    .task .fav-star{
      font-size: 18px;
      cursor: pointer;
      color: var(--muted);
      transition: color .2s ease;
    }
    .task .fav-star.active{
      color: #f59e0b;
    }

    .q-title{ font-weight: 1100; font-size: 15px; letter-spacing:.2px; }
    .q-text{ margin: 8px 0 0; color: var(--muted); line-height:1.4; font-weight: 650; font-size: 13px; }
    .timer{
      font-family: var(--mono);
      font-weight: 900;
      letter-spacing: .6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface-2) 70%, transparent);
      color: var(--text);
    }
    .input{
      width:100%;
      height: var(--tap);
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 0 12px;
      font-size: 15px;
      font-weight: 800;
      outline:none;
      transition: border-color .2s ease, box-shadow .2s ease;
      color: var(--text);
    }
    .input:focus{
      border-color: color-mix(in srgb, var(--brand) 40%, var(--border));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--brand) 14%, transparent);
    }
    .input-error{
      border-color: var(--danger) !important;
      background-color: rgba(220,38,38,0.05);
    }
    .hint{
      margin-top: 10px;
      padding: 12px 12px;
      border-radius: 18px;
      border: 1px dashed color-mix(in srgb, var(--brand) 30%, var(--border));
      background: color-mix(in srgb, var(--brand) 10%, var(--surface));
      color: var(--muted);
      line-height: 1.4;
      font-weight: 700;
      font-size: 13px;
      display:none;
    }
    .hint.show{ display:block; animation: pop .18s ease-out; }
    @keyframes pop{ from{ transform: translateY(6px); opacity:.0 } to{ transform:none; opacity:1 } }

    .donut-row{
      display:flex;
      align-items:center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .donut{
      width: 132px; height: 132px;
      border-radius: 50%;
      background: conic-gradient(var(--brand) 0deg, var(--brand) 0deg, color-mix(in srgb, var(--border) 55%, transparent) 0deg);
      display:grid;
      place-items:center;
      position:relative;
      margin: 2px 0;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
    }
    .donut::after{
      content:"";
      position:absolute;
      inset: 14px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .donut .donut-center{
      position:relative;
      z-index:1;
      text-align:center;
    }
    .donut .donut-center .big{
      font-size: 22px;
      font-weight: 1100;
      letter-spacing: .2px;
    }
    .donut .donut-center .small{
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
    }

    .ach{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .ach-item{
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .ach-left{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .medal{
      width: 40px; height: 40px;
      border-radius: 16px;
      display:grid;
      place-items:center;
      border: 1px solid var(--border);
      background: color-mix(in srgb, #f59e0b 18%, var(--surface));
    }
    .ach-name{ font-weight: 1100; font-size: 13px; }
    .ach-desc{ color: var(--muted); font-weight: 750; font-size: 12px; margin-top: 2px; }
    .locked{ opacity: .45; filter: saturate(.7); }
    .next-goal{
      margin-top: 12px;
      padding: 12px;
      border-radius: var(--radius-lg);
      background: color-mix(in srgb, var(--brand) 10%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--brand) 20%, var(--border));
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .msg{
      padding: 12px 14px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, border-color .2s ease;
    }
    .msg:active{ transform: scale(.99); }
    .msg:hover{ border-color: color-mix(in srgb, var(--brand) 22%, var(--border)); }
    .msg-title{ font-weight: 1100; font-size: 13px; }
    .msg-text{ margin-top: 4px; color: var(--muted); font-weight: 700; font-size: 12.5px; line-height:1.35; }
    .dot{
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 8px 18px rgba(59,130,246,.25);
      border: 2px solid var(--surface);
    }

    .toast{
      position:absolute;
      left: 12px;
      right: 12px;
      bottom: calc(var(--tabbar-h) + 10px);
      display:flex;
      justify-content:center;
      pointer-events:none;
      z-index: 10;
    }
    .toast .bubble{
      pointer-events:auto;
      max-width: 96%;
      border-radius: 18px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      display:flex;
      align-items:center;
      gap: 10px;
      font-weight: 900;
      animation: rise .22s ease-out;
    }
    .bubble.ok{ border-color: color-mix(in srgb, var(--success) 26%, var(--border)); }
    .bubble.bad{ border-color: color-mix(in srgb, var(--danger) 26%, var(--border)); }
    .bubble span{ font-weight: 850; }
    .bubble small{ display:block; font-weight: 750; color: var(--muted); margin-top: 2px; }
    @keyframes rise{ from{ transform: translateY(10px); opacity: 0 } to{ transform:none; opacity:1 } }

    .sp{ height: 10px; }
    .divider{ height: 1px; background: var(--border); margin: 12px 2px; opacity:.8; }
    .kpi{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .kpi .card{ padding: 12px 14px; }
    .kpi .val{ font-weight: 1100; font-size: 18px; }
    .kpi .lab{ color: var(--muted); font-weight: 850; font-size: 12px; margin-top: 3px; }

    .hide{ display:none !important; }

    main::-webkit-scrollbar{ width: 10px; }
    main::-webkit-scrollbar-thumb{
      background: color-mix(in srgb, var(--border) 70%, transparent);
      border-radius: 999px;
      border: 3px solid transparent;
      background-clip: content-box;
    }

    /* Стили для экзамена */
    .exam-progress{
      display:flex;
      gap:4px;
      flex-wrap:wrap;
      margin:10px 0;

  <script>
    // =========================================================
    // 1) Состояние приложения (localStorage + sessionStorage)
    // =========================================================
    const LS_KEY = "smartege_state_v14";
    const AUTH_KEY = "smartege_auth_v1";
    const TASKS_KEY = "smartege_tasks_v2";

    // ----- ИНФОРМАТИКА: БАЗОВЫЕ ТЕМЫ (для группировки) -----
    const THEMES_INF = [
      { id: "coding", name: "Кодирование информации" },
      { id: "logic", name: "Алгебра логики" },
      { id: "systems", name: "Системы счисления" },
      { id: "graphs", name: "Графы и сети" },
      { id: "algorithms", name: "Алгоритмы" },
      { id: "programming", name: "Программирование" }
    ];

    const THEORY_INF = {
      coding: `<b>Кодирование информации</b> — это представление информации в форме, удобной для хранения, передачи и обработки.

      <b>Равномерное и неравномерное кодирование</b><br>
      Равномерные коды используют одинаковое количество бит для всех символов. Неравномерные коды позволяют экономить память, но требуют соблюдения условия Фано для однозначного декодирования.

      <b>Условие Фано (прямое)</b>: ни одно кодовое слово не является началом другого кодового слова. Тогда код можно декодировать однозначно, читая слева направо.

      <b>Условие Фано (обратное)</b>: ни одно кодовое слово не является концом другого. Тогда однозначное декодирование возможно при чтении справа налево.

      <b>Количество информации</b>
      <ul>
        <li>Формула Хартли: I = log₂N, где N — количество равновероятных событий.</li>
        <li>Формула Шеннона: I = -∑ pᵢ log₂pᵢ (для неравновероятных событий).</li>
      </ul>

      <b>Единицы измерения</b>: бит, байт (8 бит), Кбайт (1024 байта), Мбайт, Гбайт.`,

      logic: `<b>Алгебра логики</b> оперирует высказываниями, которые могут быть истинными (1) или ложными (0).

      <b>Основные логические операции</b>:
      <ul>
        <li>Конъюнкция (И, ∧): 1 ∧ 1 = 1, иначе 0.</li>
        <li>Дизъюнкция (ИЛИ, ∨): 0 ∨ 0 = 0, иначе 1.</li>
        <li>Отрицание (НЕ, ¬): ¬1 = 0, ¬0 = 1.</li>
        <li>Импликация (→): A → B = ¬A ∨ B.</li>
        <li>Эквиваленция (∼): A ∼ B = (A ∧ B) ∨ (¬A ∧ ¬B).</li>
      </ul>

      <b>Законы алгебры логики</b>:
      <ul>
        <li>Закон двойного отрицания: ¬(¬A) = A.</li>
        <li>Законы де Моргана: ¬(A ∧ B) = ¬A ∨ ¬B; ¬(A ∨ B) = ¬A ∧ ¬B.</li>
        <li>Распределительный закон: A ∧ (B ∨ C) = (A ∧ B) ∨ (A ∧ C).</li>
        <li>Законы поглощения: A ∧ (A ∨ B) = A; A ∨ (A ∧ B) = A.</li>
      </ul>

      <b>Таблицы истинности</b> строятся для всех возможных наборов значений переменных.`,

      systems: `<b>Позиционная система счисления</b> — система, в которой значение цифры зависит от её позиции.

      <b>Двоичная система</b> (основание 2): цифры 0,1.<br>
      Пример: 1011₂ = 1·2³ + 0·2² + 1·2¹ + 1·2⁰ = 8+0+2+1=11₁₀.

      <b>Восьмеричная система</b> (основание 8): цифры 0-7.<br>
      <b>Шестнадцатеричная система</b> (основание 16): цифры 0-9, A=10, B=11, C=12, D=13, E=14, F=15.

      <b>Перевод из десятичной в двоичную</b>:
      Последовательно делить на 2, записывая остатки. Записать остатки в обратном порядке.

      <b>Перевод из двоичной в восьмеричную</b>: разбить на триады справа налево, каждую триаду заменить восьмеричной цифрой.<br>
      <b>Перевод из двоичной в шестнадцатеричную</b>: разбить на тетрады.

      <b>Арифметика в двоичной системе</b>:
      <ul>
        <li>0+0=0, 0+1=1, 1+1=10 (единица переносится в следующий разряд)</li>
        <li>0·0=0, 0·1=0, 1·1=1</li>
      </ul>`,

      graphs: `<b>Граф</b> — это набор вершин и соединяющих их рёбер.

      <b>Основные понятия</b>:
      <ul>
        <li>Неориентированный граф — рёбра не имеют направления.</li>
        <li>Ориентированный граф (орграф) — рёбра имеют направление (дуги).</li>
        <li>Вес ребра — числовая характеристика (длина, стоимость).</li>
      </ul>

      <b>Поиск кратчайшего пути</b>:
      <ul>
        <li>Алгоритм Дейкстры (для графов с неотрицательными весами).</li>
        <li>Алгоритм Флойда-Уоршелла.</li>
        <li>Для небольших графов можно использовать перебор или метод динамического программирования.</li>
      </ul>

      <b>Таблицы и схемы дорог</b> часто задаются в виде таблицы смежности или весовой матрицы.`,

      algorithms: `<b>Алгоритм</b> — это конечная последовательность действий, приводящая от исходных данных к результату.

      <b>Свойства алгоритмов</b>: дискретность, детерминированность, понятность, результативность, массовость.

      <b>Исполнители</b>: Черепашка, Робот, Чертежник и др. Они выполняют определённый набор команд.

      <b>Анализ алгоритмов</b>:
      <ul>
        <li>Ручная трассировка — пошаговое выполнение с записью состояний.</li>
        <li>Поиск закономерностей — часто алгоритм порождает последовательность (например, числа Фибоначчи).</li>
      </ul>

      <b>Рекурсия</b> — вызов функцией самой себя. Пример: вычисление факториала, чисел Фибоначчи.`,

      programming: `<b>Программирование</b> — запись алгоритмов на языке программирования.

      <b>Основные конструкции</b>:
      <ul>
        <li>Ввод/вывод данных.</li>
        <li>Условный оператор (if-else).</li>
        <li>Циклы (for, while).</li>
        <li>Массивы (одномерные, двумерные).</li>
      </ul>

      <b>Анализ программ</b>:
      <ul>
        <li>Определение результата выполнения при заданных входных данных.</li>
        <li>Поиск ошибок.</li>
        <li>Построение математической модели работы программы.</li>
      </ul>

      <b>Динамическое программирование</b> — метод решения сложных задач путём разбиения их на подзадачи. Часто используется для задач на количество вариантов.`
    };

    // =========================================================
    // 1.5) ГЕНЕРАТОРЫ ЗАДАНИЙ (50+ заданий на тему)
    // =========================================================

    // ----- КОДИРОВАНИЕ (8 типов × 8-10 вариантов = ~70) -----
    function generateCodingTasks(count) {
      const tasks = [];
      const types = [
        // 0: количество сообщений по битам
        (i) => {
          const bits = 4 + (i % 8);
          const total = 1 << bits;
          return {
            title: `Кодирование: количество сообщений (${bits} бит)`,
            prompt: `Сколько различных сообщений можно закодировать с помощью ${bits} бит?`,
            answer: String(total),
            hint: `2^${bits} = ${total}`,
            solution: `Количество сообщений = 2^${bits} = ${total}.`
          };
        },
        // 1: перевод в двоичную
        (i) => {
          const num = 50 + i * 7 + (i % 5);
          const bin = num.toString(2);
          return {
            title: `Кодирование: перевод в двоичную (${num})`,
            prompt: `Переведите число ${num} в двоичную систему счисления.`,
            answer: bin,
            hint: `Делите на 2, остатки записывайте в обратном порядке.`,
            solution: `${num}₁₀ = ${bin}₂.`
          };
        },
        // 2: перевод из двоичной
        (i) => {
          const bin = (60 + i * 11 + (i % 7)).toString(2);
          const dec = parseInt(bin, 2);
          return {
            title: `Кодирование: перевод в десятичную (${bin})`,
            prompt: `Переведите двоичное число ${bin}₂ в десятичную систему.`,
            answer: String(dec),
            hint: `Разложите по степеням двойки.`,
            solution: `${bin}₂ = ${dec}₁₀.`
          };
        },
        // 3: скорость передачи
        (i) => {
          const size = 8 + i * 3 + (i % 6);
          const time = 5 + (i % 8);
          const result = (size * 8 / time);
          return {
            title: `Кодирование: скорость передачи (${size} Кбайт)`,
            prompt: `Файл размером ${size} Кбайт передан за ${time} с. Найдите скорость в Кбит/с.`,
            answer: String(Math.round(result * 10) / 10),
            hint: `${size} Кбайт = ${size*8} Кбит, /${time}с = ${Math.round(result*10)/10} Кбит/с`,
            solution: `Скорость = ${size}×8/${time} = ${Math.round(result*10)/10} Кбит/с.`
          };
        },
        // 4: бит на символ
        (i) => {
          const alpha = 3 + (i % 10) + (i % 3);
          const bits = Math.ceil(Math.log2(alpha));
          return {
            title: `Кодирование: бит на символ (${alpha} символов)`,
            prompt: `Алфавит содержит ${alpha} символов. Сколько бит нужно для кодирования одного символа?`,
            answer: String(bits),
            hint: `Нужно найти k: 2^k ≥ ${alpha}.`,
            solution: `2^${bits-1} = ${1<<(bits-1)} < ${alpha} ≤ 2^${bits} = ${1<<bits}, значит k = ${bits}.`
          };
        },
        // 5: количество слов
        (i) => {
          const n = 2 + (i % 5);
          const total = 3 ** n;
          return {
            title: `Кодирование: количество слов (длина ${n})`,
            prompt: `Сколько слов длины ${n} из букв {А,Б,В} можно составить?`,
            answer: String(total),
            hint: `Каждая позиция — 3 варианта, итого 3^${n}.`,
            solution: `3^${n} = ${total}.`
          };
        },
        // 6: байты в Кбайты
        (i) => {
          const sz = 2 + (i % 8);
          const vol = sz * 1024;
          return {
            title: `Кодирование: байты в Кбайты (${sz} Кбайт)`,
            prompt: `Сколько байт в ${sz} Кбайт?`,
            answer: String(vol),

    let TASKS_INF = [];
    function loadTasks() {
      try {
        const raw = localStorage.getItem(TASKS_KEY);

          if (Array.isArray(parsed) && parsed.length > 0) {
            TASKS_INF = parsed;
            return;

        return { text: `a=2; b=3; a=a+b; b=a-b; a=a-b; Чему равны a и b?`, answer: "a=3 b=2", explanation: "Обмен значений." };
      } else if (type === 6) {
        let arr = [3,7,2,9,5];
        let max = Math.max(...arr);
        return { text: `Максимум в массиве ${JSON.stringify(arr)}?`, answer: String(max), explanation: `Максимум = ${max}` };
      } else {
        let n = Math.floor(Math.random()*8)+2;
        let sum = 0; for(let i=1;i<=n;i++) sum+=i;
        return { text: `Сумма чисел от 1 до ${n} (цикл for)?`, answer: String(sum), explanation: `Сумма = ${sum}` };
      }
    }

    function loadState(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if(!raw) return structuredClone(DEFAULT_STATE);
        const parsed = JSON.parse(raw);
        if (!parsed.mistakes) parsed.mistakes = [];
        if (!parsed.topicStats) parsed.topicStats = {};
        if (!parsed.streak) parsed.streak = { lastDate: null, count: 0 };
        if (!parsed.attempts) parsed.attempts = {};
        if (!parsed.plan) parsed.plan = { tasks: DEFAULT_STATE.plan.tasks.map(t => ({ ...t })) };
        if (!parsed.notifications) parsed.notifications = [];
        if (!parsed.adaptiveStats) parsed.adaptiveStats = {};
        if (parsed.isDemo === undefined) parsed.isDemo = false;
        if (!parsed.mistakeReview) parsed.mistakeReview = null;
        if (!parsed.achievements) parsed.achievements = DEFAULT_STATE.achievements;
        if (!parsed.examHistory) parsed.examHistory = [];
        if (!parsed.miniGoals) parsed.miniGoals = structuredClone(DEFAULT_STATE.miniGoals);
        return { ...structuredClone(DEFAULT_STATE), ...parsed };
      }catch(e){
        return structuredClone(DEFAULT_STATE);
      }
    }

      if (state.isDemo) return;
      localStorage.setItem(LS_KEY, JSON.stringify(state));

        </div>

      toast._t = setTimeout(()=> { $toast.innerHTML = ""; }, 2600);

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");

      if(r1 === "subject" && r2 === "inf"){

    function go(hash, replace=false) {

      }

    function setActiveTab(tab){
      const tabs = Array.from(document.querySelectorAll(".tab"));
      tabs.forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
      if(tab === "subject" || tab === "task" || tab === "exam"){
        tabs.forEach(t => t.classList.remove("active"));
        const examTab = tabs.find(t => t.dataset.tab === "exam");
        if (examTab && tab === "exam") examTab.classList.add("active");

        tabs.forEach(t => t.classList.toggle("active", t.dataset.tab === "home"));

    function addNotification(title, text, hash) {
      const exists = state.notifications.some(n => n.title === title && n.text === text);

      state.notifications.unshift({
        id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
        title, text, hash,

      saveState(state);
      updateBellBadge();

      if (unread > 0) {

    function checkAbsence() {
      const lastDate = state.streak?.lastDate;
      if (lastDate) {
        const diff = Math.floor((Date.now() - new Date(lastDate)) / (1000*60*60*24));
        if (diff >= 3) {
          addNotification("🔥 Вы не заходили 3 дня", "Продолжить подготовку?", "#/home");
        }
      }

    // =========================================================
    // 5) Вспомогательные функции
    // =========================================================
    function getWeakThemes() {
      const stats = state.topicStats || {};
      const weak = [];
      for (const theme of THEMES_INF) {
        const stat = stats[theme.id];
        if (stat && stat.total >= 2) {
          const pct = Math.round((stat.correct / stat.total) * 100);
          if (pct < 70) {
            weak.push({ ...theme, pct });
          }
        }
      }
      weak.sort((a,b) => a.pct - b.pct);
      return weak;
    }

    function getBestThemes() {
      const stats = state.topicStats || {};
      const best = [];
      for (const theme of THEMES_INF) {
        const stat = stats[theme.id];
        if (stat && stat.total >= 2) {
          const pct = Math.round((stat.correct / stat.total) * 100);
          best.push({ ...theme, pct });
        }
      }
      best.sort((a,b) => b.pct - a.pct);
      return best;
    }

    function openTheoryByTheme(themeId) {
      go("#/subject/inf?tab=theory&theme=" + themeId);
    }

    function getMistakesByTopic() {
      const groups = {};
      state.mistakes.forEach(m => {
        if (!groups[m.topicId]) groups[m.topicId] = 0;
        groups[m.topicId]++;
      });
      return groups;
    }

    function getAdaptiveRecommendation() {
      const stats = state.adaptiveStats || {};
      let weakest = null;
      let weakestPct = 100;
      for (const theme of THEMES_INF) {
        const s = stats[theme.id];
        if (s && s.solved >= 3) {
          const pct = Math.round((s.correct / s.solved) * 100);
          if (pct < weakestPct) {
            weakestPct = pct;
            weakest = theme;
          }
        }
      }
      return weakest;
    }

    // ---- РЕСЕТ МИНИ-ЦЕЛЕЙ (ежедневно) ----
    function resetMiniGoalsIfNeeded() {
      const today = new Date().toDateString();
      if (state.miniGoals.lastReset !== today) {
        state.miniGoals.daily.tasksSolved = 0;
        state.miniGoals.daily.mistakesFixed = 0;
        state.miniGoals.daily.examsPassed = 0;
        state.miniGoals.lastReset = today;
        saveState(state);
      }
    }

    // ---- ОБНОВЛЕНИЕ МИНИ-ЦЕЛЕЙ ----
    function updateMiniGoals(type) {
      resetMiniGoalsIfNeeded();
      if (type === 'task') {
        state.miniGoals.daily.tasksSolved = (state.miniGoals.daily.tasksSolved || 0) + 1;
        const target = state.miniGoals.daily.targetTasks || 5;
        if (state.miniGoals.daily.tasksSolved >= target) {
          toast("🎯 Мини-цель выполнена!", `Решено ${target} задач сегодня!`, "ok");
          addNotification("🎯 Мини-цель", `Решено ${target} задач сегодня!`, "#/home");
        }
      } else if (type === 'mistake') {
        state.miniGoals.daily.mistakesFixed = (state.miniGoals.daily.mistakesFixed || 0) + 1;
        const target = state.miniGoals.daily.targetMistakes || 2;
        if (state.miniGoals.daily.mistakesFixed >= target) {
          toast("🎯 Мини-цель выполнена!", `Исправлено ${target} ошибок сегодня!`, "ok");
          addNotification("🎯 Мини-цель", `Исправлено ${target} ошибок сегодня!`, "#/home");
        }
      } else if (type === 'exam') {
        state.miniGoals.daily.examsPassed = (state.miniGoals.daily.examsPassed || 0) + 1;
        const target = state.miniGoals.daily.targetExams || 1;
        if (state.miniGoals.daily.examsPassed >= target) {
          toast("🎯 Мини-цель выполнена!", `Пройден ${target} экзамен сегодня!`, "ok");
          addNotification("🎯 Мини-цель", `Пройден ${target} экзамен сегодня!`, "#/home");
        }
      }
      saveState(state);
    }

    // ---- ГЛАВНАЯ СТРАНИЦА (с интеграцией статистики) ----
    function renderHome(){
      const auth = loadAuth();
      const solvedCount = TASKS_INF.filter(t => state.solved[t.id]).length;
      const total = TASKS_INF.length;
      const pct = total ? Math.round((solvedCount/total)*100) : 0;
      const streak = state.streak || { count: 0 };
      const streakCount = streak.count || 0;

      resetMiniGoalsIfNeeded();
      const goals = state.miniGoals.daily;
      const tasksDone = goals.tasksSolved || 0;
      const tasksTarget = goals.targetTasks || 5;
      const mistakesDone = goals.mistakesFixed || 0;
      const mistakesTarget = goals.targetMistakes || 2;
      const examsDone = goals.examsPassed || 0;
      const examsTarget = goals.targetExams || 1;

      const weakThemes = getWeakThemes();
      const bestThemes = getBestThemes();
      const weakest = weakThemes.length > 0 ? weakThemes[0] : null;
      const best = bestThemes.length > 0 ? bestThemes[0] : null;

      const adaptive = getAdaptiveRecommendation();

      // История экзаменов
      const history = state.examHistory || [];
      const historyHtml = history.length ? history.slice(-5).map((h, i) => {
        const cls = h.score >= 70 ? 'good' : (h.score >= 40 ? 'ok' : 'bad');
        const dateStr = h.date ? new Date(h.date).toLocaleDateString() : `Экзамен ${i+1}`;
        return `
          <div class="exam-history-item">
            <span class="date">${escapeHtml(dateStr)}</span>

    // ---- ПЛАН ----
    function renderPlan(){
      const weakThemes = getWeakThemes();
      const examDate = new Date(2026, 5, 1);
      const now = new Date();
      const daysLeft = Math.max(0, Math.floor((examDate - now) / (1000*60*60*24)));

      // Генерируем план на основе слабых тем
      const planTasks = [];
      if (weakThemes.length > 0) {
        planTasks.push({ text: `Повторить тему «${weakThemes[0].name}» (точность ${weakThemes[0].pct}%)`, done: false });
      } else {
        planTasks.push({ text: "Повторить пройденный материал", done: false });
      }
      const unsolvedCount = TASKS_INF.filter(t => !state.solved[t.id]).length;
      const toSolve = Math.min(5, unsolvedCount);
      planTasks.push({ text: `Решить ${toSolve} заданий`, done: false });
      if (state.mistakes.length > 0) {
        planTasks.push({ text: `Исправить ${Math.min(3, state.mistakes.length)} ошибок`, done: false });
      } else {
        planTasks.push({ text: "Пройти пробный экзамен", done: false });
      }

      const allDone = planTasks.every(t => t.done);

      $main.innerHTML = `
        <div class="section-title">📅 План подготовки</div>
        <div class="card pad">
          <div style="font-weight:1100;font-size:18px;">До ЕГЭ: ${daysLeft} дней</div>
        </div>

        <div class="card pad" style="margin-top:12px;">
          <div style="font-weight:1100;margin-bottom:8px;">Слабые темы</div>
          ${weakThemes.length ? weakThemes.slice(0, 3).map((w, i) => `
            <div class="plan-item">
              <span class="num">${i+1}</span>
              <span class="text">${escapeHtml(w.name)}</span>
              <span class="chip">${w.pct}%</span>
            </div>
          `).join('') : `
            <div class="muted">Отлично! Слабых тем не обнаружено.</div>
          `}
        </div>

        <div class="card pad" style="margin-top:12px;">
          <div style="font-weight:1100;margin-bottom:8px;">Сегодня</div>
          ${planTasks.map((item, idx) => `
            <div class="plan-item" style="border-color:${item.done ? 'var(--success)' : 'var(--border)'}; background:${item.done ? 'color-mix(in srgb, var(--success) 10%, var(--surface))' : 'var(--surface-2)'};">
              <span class="num" style="background:${item.done ? 'var(--success)' : 'var(--brand)'};">${idx+1}</span>
              <span class="text">${escapeHtml(item.text)}</span>
              <span class="chip" style="cursor:pointer;" data-plan-toggle="${idx}">${item.done ? '✅' : '⬜'}</span>
            </div>
          `).join('')}
          ${allDone ? `<div class="card pad" style="margin-top:8px;border-color:var(--success);background:color-mix(in srgb, var(--success) 8%, var(--surface));">🎉 Все задачи на сегодня выполнены!</div>` : ''}
        </div>

        <button class="btn primary full" style="margin-top:12px;" id="startPlanBtn">
          🚀 Начать выполнение плана
        </button>
      `;

      document.querySelectorAll("[data-plan-toggle]").forEach(el => {
        el.addEventListener("click", () => {
          const idx = parseInt(el.getAttribute("data-plan-toggle"));
          if (!isNaN(idx) && planTasks[idx]) {
            planTasks[idx].done = !planTasks[idx].done;
            state.plan.tasks = planTasks;
            saveState(state);
            renderPlan();
          }
        });
      });

      document.getElementById("startPlanBtn")?.addEventListener("click", ()=>{
        const weak = getWeakThemes();
        if (weak.length > 0) {
          const topicId = weak[0].id;
          currentTopic = topicId;
          generateNewTask();
          go("#/subject/inf?tab=training");
          toast("План", "Начинаем тренировку по слабой теме", "ok");
        } else {
          go("#/subject/inf?tab=practice");
        }
      });
    }

    // ---- ПРЕДМЕТЫ ----
    function renderSubjects(){
      $main.innerHTML = `
        <div class="section-title">Доступные предметы <span class="chip">${state.subjects.length} предмета</span></div>
        <div class="grid">
          ${state.subjects.map(s => subjectCard(s, s.id === "inf")).join("")}
        </div>
        <div class="divider"></div>
        <div class="card pad">
          <div class="row">
            <div>
              <div style="font-weight:1100">Новые задания ФИПИ</div>
              <div class="muted" style="font-weight:750;font-size:12.5px;margin-top:3px;line-height:1.35">
                В информатику добавлены задания по условию Фано и графам. <strong>${TASKS_INF.length}</strong> заданий доступно.
              </div>
            </div>
          </div>
        </div>
      `;
      hydrateProgressBars();
      document.querySelectorAll(".subject:not([data-open])").forEach(el => {
        el.addEventListener("click", () => {
          toast("Скоро", "Этот предмет появится в следующем обновлении.", "bad");
        });
      });
    }

    function subjectCard(s, clickable){
      const onclick = clickable ? `data-open="${s.id}"` : "";
      const hint = clickable ? `<span class="chip">Открыть</span>` : `<span class="chip">Скоро</span>`;
      return `
        <div class="card subject" ${onclick}>
          <div class="row">
            <div class="s-ico" aria-hidden="true"><span style="font-weight:1100">${escapeHtml(s.icon)}</span></div>
            ${hint}
          </div>
          <div class="name">${escapeHtml(s.name)}</div>
          <div class="pct">Прогресс: <strong>${s.progress}%</strong></div>
          <div class="bar" aria-hidden="true"><i data-bar="${s.id}" style="width:${s.progress}%"></i></div>
        </div>
      `;
    }

    function hydrateProgressBars(){
      requestAnimationFrame(()=>{
        document.querySelectorAll("[data-bar]").forEach(i=>{
          const id = i.getAttribute("data-bar");
          const s = state.subjects.find(x=>x.id===id);
          i.style.width = (s?.progress ?? 0) + "%";
        });
      });
      document.querySelectorAll("[data-open]").forEach(el=>{
        el.addEventListener("click", ()=>{
          const id = el.getAttribute("data-open");
          if(id === "inf") go("#/subject/inf?tab=theory");
          else toast("Скоро", "Этот предмет появится в следующем обновлении.", "bad");
        });
      });
    }

    // ---- ИНФОРМАТИКА ----
    function renderSubjectInf(tab){
      const qs = new URLSearchParams((location.hash.split("?")[1]||""));
      const themeParam = qs.get("theme");

      $main.innerHTML = `
        <div class="seg" role="tablist" aria-label="Табы предмета">
          <button class="${tab==='theory'?'active':''}" id="tabTheory" role="tab" aria-selected="${tab==='theory'}">Теория</button>
          <button class="${tab==='practice'?'active':''}" id="tabPractice" role="tab" aria-selected="${tab==='practice'}">Практика</button>
          <button class="${tab==='training'?'active':''}" id="tabTraining" role="tab" aria-selected="${tab==='training'}">🎯 Тренировка</button>
          <button class="${tab==='mistakes'?'active':''}" id="tabMistakes" role="tab" aria-selected="${tab==='mistakes'}">⚠️ Ошибки (${state.mistakes.length})</button>
        </div>
        ${tab === "theory" ? renderInfTheory(themeParam) : (tab === "practice" ? renderInfPractice() : "")}
      `;

      document.getElementById("tabTheory").addEventListener("click", ()=> go("#/subject/inf?tab=theory"));
      document.getElementById("tabPractice").addEventListener("click", ()=> go("#/subject/inf?tab=practice"));
      document.getElementById("tabTraining").addEventListener("click", ()=> go("#/subject/inf?tab=training"));
      document.getElementById("tabMistakes").addEventListener("click", ()=> go("#/subject/inf?tab=mistakes"));

      document.getElementById("toPracticeInf")?.addEventListener("click", ()=> go("#/subject/inf?tab=practice"));

      if(tab === "practice") {
        document.querySelectorAll("[data-theme-filter-inf]").forEach(el=>{
          el.addEventListener("click", (e)=>{
            const themeId = e.target.getAttribute("data-theme-filter-inf");
            state.selectedThemeInf = themeId === "all" ? null : themeId;
            saveState(state);
            renderSubjectInf("practice");
          });
        });
        document.getElementById("filterUnsolvedInf")?.addEventListener("change", (e)=>{
          state.showOnlyUnsolvedInf = e.target.checked;
          saveState(state);
          renderSubjectInf("practice");
        });
        document.getElementById("filterFavoritesInf")?.addEventListener("change", (e)=>{
          state.showOnlyFavoritesInf = e.target.checked;
          saveState(state);
          renderSubjectInf("practice");
        });
        document.getElementById("resetFiltersInf")?.addEventListener("click", ()=>{
          state.selectedThemeInf = null;
          state.showOnlyUnsolvedInf = false;
          state.showOnlyFavoritesInf = false;
          saveState(state);
          renderSubjectInf("practice");
        });
      }

      document.querySelectorAll(".acc-head").forEach(head=>{
        head.addEventListener("click", ()=>{
          const item = head.closest(".acc-item");
          item.classList.toggle("open");
        });
      });

      document.querySelectorAll("[data-task]").forEach(el=>{
        el.addEventListener("click", (e)=>{
          e.stopPropagation();
          const id = el.getAttribute("data-task");
          go("#/task/" + id);
        });
      });

      document.querySelectorAll("[data-fav]").forEach(el=>{
        el.addEventListener("click", (e)=>{
          e.stopPropagation();
          const id = el.getAttribute("data-fav");
          toggleFavorite(id);
          renderSubjectInf(tab);
        });
      });

      if (themeParam && tab === "theory") {
        setTimeout(() => {
          const targetTheme = THEMES_INF.find(t => t.id === themeParam);
          if (targetTheme) {
            const items = document.querySelectorAll(".acc-item");
            items.forEach(item => {
              const strong = item.querySelector(".acc-head strong");
              if (strong && strong.textContent.includes(targetTheme.name)) {
                item.classList.add("open");
                item.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }
            });
          }
        }, 200);
      }
    }

    function renderInfTheory(themeParam){
      const getThemeTaskCount = (themeId) => {
        return TASKS_INF.filter(t => t.themeId === themeId).length;
      };
      const getOpenClass = (themeId) => {
        return themeParam === themeId ? 'open' : '';
      };
      return `
        <div class="section-title">Учебные материалы <span class="chip">Теория ФИПИ</span></div>
        <div class="acc" aria-label="Список тем (теория)">
          ${accItem("Кодирование информации", THEORY_INF.coding, ["Равномерные/неравномерные коды", "Условие Фано", "Количество информации"], getThemeTaskCount("coding"), getOpenClass("coding"))}
          ${accItem("Алгебра логики", THEORY_INF.logic, ["Логические операции", "Таблицы истинности", "Законы де Моргана"], getThemeTaskCount("logic"), getOpenClass("logic"))}
          ${accItem("Системы счисления", THEORY_INF.systems, ["Двоичная система", "Перевод между системами", "Арифметика"], getThemeTaskCount("systems"), getOpenClass("systems"))}
          ${accItem("Графы", THEORY_INF.graphs, ["Поиск путей", "Взвешенные графы"], getThemeTaskCount("graphs"), getOpenClass("graphs"))}
          ${accItem("Алгоритмы", THEORY_INF.algorithms, ["Исполнители", "Рекурсия", "Анализ"], getThemeTaskCount("algorithms"), getOpenClass("algorithms"))}
          ${accItem("Программирование", THEORY_INF.programming, ["Динамика", "Массивы"], getThemeTaskCount("programming"), getOpenClass("programming"))}

              <div style="font-weight:1100">Совет</div>
              <div class="muted" style="font-weight:750;font-size:12.5px;margin-top:3px;line-height:1.35">
