```html
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SmartЕГЭ — экзамен, избранное, статистика.</title>

  <style>
    /* =========================================================
      SmartЕГЭ — версия с новыми улучшениями:
      - Режим «Экзамен» (случайная выборка, таймер, разбор)
      - Избранное (добавление заданий)
      - Статистика по темам (круговые диаграммы)
      - Тема в карточке задания
      - Поддержка разных форматов чисел (запятая/точка)
    ========================================================== */

    :root{
      --bg: #d8d8d8;
      --surface: #ffffff;
      --surface-2: #f7f8fb;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #3b82f6;
      --brand-2: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --shadow: 0 10px 30px rgba(15, 23, 42, .12);
      --shadow-soft: 0 6px 18px rgba(15, 23, 42, .08);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --border: rgba(15, 23, 42, .10);
      --tap: 48px;
      --phone-w: 410px;
      --header-h: 64px;
      --tabbar-h: 76px;
      --safe: 14px;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, "Apple Color Emoji","Segoe UI Emoji";
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    body.theme-dark{
      --bg: #0b1220;
      --surface: #0f172a;
      --surface-2: #111c33;
      --text: #e5eaf5;
      --muted: #9aa6c0;
      --brand: #60a5fa;
      --brand-2: #3b82f6;
      --border: rgba(229, 234, 245, .12);
      --shadow: 0 12px 34px rgba(0, 0, 0, .35);
      --shadow-soft: 0 8px 22px rgba(0, 0, 0, .28);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background: var(--bg);
    }

    .desk{
      min-height:100%;
      display:grid;
      place-items:center;
      padding: 28px 16px;
      background:
        radial-gradient(1200px 900px at 20% 10%, rgba(59,130,246,.16), transparent 45%),
        radial-gradient(900px 700px at 85% 20%, rgba(16,185,129,.10), transparent 45%),
        radial-gradient(1100px 900px at 50% 85%, rgba(234,179,8,.08), transparent 40%),
        linear-gradient(180deg, #cbd5e1 0%, #e5e7eb 35%, #dbeafe 100%);
    }
    body.theme-dark .desk{
      background:
        radial-gradient(1200px 900px at 20% 10%, rgba(96,165,250,.18), transparent 45%),
        radial-gradient(900px 700px at 85% 20%, rgba(16,185,129,.10), transparent 45%),
        radial-gradient(1100px 900px at 50% 85%, rgba(234,179,8,.07), transparent 40%),
        linear-gradient(180deg, #0b1220 0%, #07101f 45%, #070b14 100%);
    }

    .phone{
      width: min(var(--phone-w), 92vw);
      height: min(860px, 92vh);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
      display:flex;
      flex-direction:column;
    }
    .phone::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:26px;
      border:1px solid rgba(255,255,255,.06);
      pointer-events:none;
    }

    header.app-header{
      height: var(--header-h);
      display:grid;
      grid-template-columns: 46px 1fr 46px;
      align-items:center;
      padding: 0 calc(var(--safe) + 6px);
      gap: 10px;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      border-bottom: 1px solid var(--border);
      position:relative;
      z-index: 5;
    }
    .header-title{
      text-align:center;
      font-weight: 800;
      letter-spacing: .2px;
      font-size: 16px;
      line-height: 1.1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      user-select:none;
    }
    .header-sub{
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 600;
    }
    .header-stack{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-width:0;
    }

    .icon-btn{
      height: 42px;
      width: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      box-shadow: var(--shadow-soft);
      display:grid;
      place-items:center;
      cursor:pointer;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
      user-select:none;
    }
    .icon-btn:active{ transform: scale(.97); }
    .icon{
      width: 20px;
      height: 20px;
      display:block;
    }

    .badge{
      position:absolute;
      top: 10px;
      right: 12px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--danger);
      color:#fff;
      font-size: 11px;
      font-weight: 800;
      display:grid;
      place-items:center;
      border: 2px solid var(--surface);
      box-shadow: 0 6px 14px rgba(220,38,38,.25);
    }

    main{
      flex:1;
      overflow:auto;
      padding: 14px var(--safe) calc(var(--tabbar-h) + 16px);
      background:
        radial-gradient(900px 400px at 50% 0%, rgba(59,130,246,.08), transparent 45%),
        linear-gradient(180deg, color-mix(in srgb, var(--surface) 96%, transparent), var(--surface));
    }

    nav.tabbar{
      height: var(--tabbar-h);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      border-top: 1px solid var(--border);
      padding: 8px 10px 12px;
      display:grid;
      grid-template-columns: repeat(5, 1fr); /* Добавили пятый таб для экзамена */
      gap: 4px;
      position:absolute;
      left:0; right:0; bottom:0;
      z-index: 6;
      backdrop-filter: blur(10px);
    }
    .tab{
      height: 56px;
      border-radius: 18px;
      border: 1px solid transparent;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap: 3px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
      color: var(--muted);
    }
    .tab:hover{ background: color-mix(in srgb, var(--surface-2) 70%, transparent); }
    .tab:active{ transform: scale(.98); }
    .tab.active{
      background: color-mix(in srgb, var(--brand) 16%, var(--surface));
      border-color: color-mix(in srgb, var(--brand) 30%, var(--border));
      color: var(--text);
    }
    .tab .tab-ico{ font-size: 20px; line-height: 1; }
    .tab .tab-label{ font-size: 10px; font-weight: 800; letter-spacing: .2px; }

    .card{
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
    }
    .card.pad{ padding: 14px; }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .muted{ color: var(--muted); }
    .btn{
      height: var(--tap);
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      font-weight: 900;
      letter-spacing: .2px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
      user-select:none;
    }
    .btn:active{ transform: scale(.98); }
    .btn.primary{
      background: linear-gradient(180deg, var(--brand), var(--brand-2));
      border-color: rgba(255,255,255,.12);
      color:#fff;
      box-shadow: 0 12px 22px rgba(37,99,235,.25);
    }
    .btn.ghost{
      background: transparent;
      border-color: color-mix(in srgb, var(--border) 95%, transparent);
    }
    .btn.full{ width:100%; }
    .btn.small{ height: 36px; font-size: 12px; }

    .chip{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface-2) 70%, transparent);
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      white-space:nowrap;
    }
    .chip.ok{ color: var(--success); border-color: color-mix(in srgb, var(--success) 22%, var(--border)); background: color-mix(in srgb, var(--success) 10%, var(--surface)); }
    .chip.warn{ color: #b45309; border-color: color-mix(in srgb, #f59e0b 22%, var(--border)); background: color-mix(in srgb, #f59e0b 10%, var(--surface)); }
    .chip.bad{ color: var(--danger); border-color: color-mix(in srgb, var(--danger) 22%, var(--border)); background: color-mix(in srgb, var(--danger) 10%, var(--surface)); }
    .chip.active{
      background: var(--brand);
      color: #fff;
      border-color: var(--brand-2);
    }
    .chip.fav{
      background: #fef9c3;
      color: #854d0e;
      border-color: #fde047;
    }

    .section-title{
      font-size: 14px;
      font-weight: 1000;
      letter-spacing: .2px;
      margin: 14px 4px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .center{
      min-height: calc(100% - 10px);
      display:grid;
      place-items:center;
      padding: 20px 8px;
    }
    .hero{
      width: 100%;
      max-width: 360px;
      padding: 18px;
    }
    .brand-badge{
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(180deg, var(--brand), var(--brand-2));
      display:grid;
      place-items:center;
      color:#fff;
      box-shadow: 0 14px 26px rgba(37,99,235,.25);
      margin-bottom: 12px;
    }
    .hero h1{
      margin: 0 0 6px 0;
      font-size: 20px;
      letter-spacing: .2px;
    }
    .hero p{
      margin: 0 0 14px 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 13px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .subject{
      padding: 14px;
      cursor:pointer;
      transition: transform .12s ease, border-color .2s ease, background .2s ease;
      user-select:none;
      position:relative;
      overflow:hidden;
    }
    .subject:active{ transform: scale(.985); }
    .subject:hover{ border-color: color-mix(in srgb, var(--brand) 22%, var(--border)); }
    .subject .s-ico{
      width: 44px; height: 44px;
      border-radius: 16px;
      display:grid;
      place-items:center;
      background: color-mix(in srgb, var(--brand) 14%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--brand) 24%, var(--border));
      margin-bottom: 10px;
    }
    .subject .name{ font-weight: 1000; letter-spacing:.2px; }
    .subject .pct{ margin-top: 4px; font-weight: 800; color: var(--muted); font-size: 12px; }
    .bar{
      height: 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--border) 50%, transparent);
      overflow:hidden;
      margin-top: 10px;
    }
    .bar > i{
      display:block;
      height:100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      border-radius: 999px;
      transition: width .5s ease;
    }

    .seg{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 6px;
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface-2) 70%, transparent);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      margin-bottom: 12px;
    }
    .seg button{
      height: 42px;
      border-radius: 14px;
      border: 1px solid transparent;
      background: transparent;
      font-weight: 1000;
      cursor:pointer;
      color: var(--muted);
      transition: background .2s ease, transform .12s ease, border-color .2s ease;
    }
    .seg button:active{ transform: scale(.99); }
    .seg button.active{
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }

    .theme-scroll{
      display:flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 2px 16px;
      margin-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .theme-scroll .chip{
      flex-shrink:0;
      cursor:pointer;
    }

    .acc{
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .acc-item{
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      overflow:hidden;
    }
    .acc-head{
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      cursor:pointer;
      user-select:none;
    }
    .acc-head strong{ font-weight: 1000; font-size: 13px; }
    .acc-head span{ color: var(--muted); font-size: 12px; font-weight: 800; }
    .acc-body{
      max-height: 0px;
      overflow:hidden;
      transition: max-height .28s ease;
      border-top: 1px solid transparent;
    }
    .acc-item.open .acc-body{
      border-top-color: var(--border);
      max-height: 800px;
    }
    .acc-body ul{
      margin: 0;
      padding: 10px 16px 12px 28px;
      color: var(--muted);
      line-height: 1.35;
      font-weight: 650;
      font-size: 13px;
    }
    .acc-body .theory-text{
      padding: 10px 16px 12px 16px;
      color: var(--text);
      line-height: 1.5;
      font-weight: 500;
      font-size: 13px;
      border-top: 1px dashed var(--border);
      background: var(--surface-2);
    }
    .theory-text b, .theory-text strong { font-weight: 800; color: var(--text); }
    .theory-text ul { margin: 8px 0; padding-left: 20px; }
    .theory-text li { margin: 4px 0; }

    .list{
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .task{
      padding: 12px 14px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, border-color .2s ease;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .task:active{ transform: scale(.99); }
    .task:hover{ border-color: color-mix(in srgb, var(--brand) 22%, var(--border)); }
    .task .t-title{ font-weight: 1000; font-size: 13px; }
    .task .t-sub{ color: var(--muted); font-weight: 800; font-size: 12px; margin-top: 3px; }
    .task .meta{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap: 6px;
      min-width: 92px;
    }
    .task .fav-star{
      font-size: 18px;
      cursor: pointer;
      color: var(--muted);
      transition: color .2s ease;
    }
    .task .fav-star.active{
      color: #f59e0b;
    }

    .q-title{ font-weight: 1100; font-size: 15px; letter-spacing:.2px; }
    .q-text{ margin: 8px 0 0; color: var(--muted); line-height:1.4; font-weight: 650; font-size: 13px; }
    .timer{
      font-family: var(--mono);
      font-weight: 900;
      letter-spacing: .6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface-2) 70%, transparent);
    }
    .input{
      width:100%;
      height: var(--tap);
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 0 12px;
      font-size: 15px;
      font-weight: 800;
      outline:none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .input:focus{
      border-color: color-mix(in srgb, var(--brand) 40%, var(--border));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--brand) 14%, transparent);
    }
    .input-error{
      border-color: var(--danger) !important;
      background-color: rgba(220,38,38,0.05);
    }
    .hint{
      margin-top: 10px;
      padding: 12px 12px;
      border-radius: 18px;
      border: 1px dashed color-mix(in srgb, var(--brand) 30%, var(--border));
      background: color-mix(in srgb, var(--brand) 10%, var(--surface));
      color: var(--muted);
      line-height: 1.4;
      font-weight: 700;
      font-size: 13px;
      display:none;
    }
    .hint.show{ display:block; animation: pop .18s ease-out; }
    @keyframes pop{ from{ transform: translateY(6px); opacity:.0 } to{ transform:none; opacity:1 } }

    .donut-row{
      display:flex;
      align-items:center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .donut{
      width: 132px; height: 132px;
      border-radius: 50%;
      background: conic-gradient(var(--brand) 0deg, var(--brand) 0deg, color-mix(in srgb, var(--border) 55%, transparent) 0deg);
      display:grid;
      place-items:center;
      position:relative;
      margin: 2px 0;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
    }
    .donut::after{
      content:"";
      position:absolute;
      inset: 14px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .donut .donut-center{
      position:relative;
      z-index:1;
      text-align:center;
    }
    .donut .donut-center .big{
      font-size: 22px;
      font-weight: 1100;
      letter-spacing: .2px;
    }
    .donut .donut-center .small{
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
    }

    .mini-donut{
      width: 60px; height: 60px;
      border-radius: 50%;
      background: conic-gradient(var(--brand) 0deg, var(--brand) 0deg, color-mix(in srgb, var(--border) 55%, transparent) 0deg);
      display:inline-block;
      position:relative;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .mini-donut::after{
      content:"";
      position:absolute;
      inset: 8px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .ach{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .ach-item{
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .ach-left{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .medal{
      width: 40px; height: 40px;
      border-radius: 16px;
      display:grid;
      place-items:center;
      border: 1px solid var(--border);
      background: color-mix(in srgb, #f59e0b 18%, var(--surface));
    }
    .ach-name{ font-weight: 1100; font-size: 13px; }
    .ach-desc{ color: var(--muted); font-weight: 750; font-size: 12px; margin-top: 2px; }
    .locked{ opacity: .45; filter: saturate(.7); }
    .next-goal{
      margin-top: 12px;
      padding: 12px;
      border-radius: var(--radius-lg);
      background: color-mix(in srgb, var(--brand) 10%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--brand) 20%, var(--border));
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .msg{
      padding: 12px 14px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, border-color .2s ease;
    }
    .msg:active{ transform: scale(.99); }
    .msg:hover{ border-color: color-mix(in srgb, var(--brand) 22%, var(--border)); }
    .msg-title{ font-weight: 1100; font-size: 13px; }
    .msg-text{ margin-top: 4px; color: var(--muted); font-weight: 700; font-size: 12.5px; line-height:1.35; }
    .dot{
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 8px 18px rgba(59,130,246,.25);
      border: 2px solid var(--surface);
    }

    .toast{
      position:absolute;
      left: 12px;
      right: 12px;
      bottom: calc(var(--tabbar-h) + 10px);
      display:flex;
      justify-content:center;
      pointer-events:none;
      z-index: 10;
    }
    .toast .bubble{
      pointer-events:auto;
      max-width: 96%;
      border-radius: 18px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      display:flex;
      align-items:center;
      gap: 10px;
      font-weight: 900;
      animation: rise .22s ease-out;
    }
    .bubble.ok{ border-color: color-mix(in srgb, var(--success) 26%, var(--border)); }
    .bubble.bad{ border-color: color-mix(in srgb, var(--danger) 26%, var(--border)); }
    .bubble span{ font-weight: 850; }
    .bubble small{ display:block; font-weight: 750; color: var(--muted); margin-top: 2px; }
    @keyframes rise{ from{ transform: translateY(10px); opacity: 0 } to{ transform:none; opacity:1 } }

    .sp{ height: 10px; }
    .divider{ height: 1px; background: var(--border); margin: 12px 2px; opacity:.8; }
    .kpi{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .kpi .card{ padding: 12px 14px; }
    .kpi .val{ font-weight: 1100; font-size: 18px; }

  <script>

    const THEMES_INF = [

    // Теория с HTML-форматированием (жирный, списки)
    const THEORY_INF = {
      coding: `<b>Кодирование информации</b> — это представление информации в форме, удобной для хранения, передачи и обработки. 
      
      <b>Равномерное и неравномерное кодирование</b><br>
      Равномерные коды используют одинаковое количество бит для всех символов. Неравномерные коды позволяют экономить память, но требуют соблюдения условия Фано для однозначного декодирования.
      
      <b>Условие Фано (прямое)</b>: ни одно кодовое слово не является началом другого кодового слова. Тогда код можно декодировать однозначно, читая слева направо.
      
      <b>Условие Фано (обратное)</b>: ни одно кодовое слово не является концом другого. Тогда однозначное декодирование возможно при чтении справа налево.
      
      <b>Количество информации</b>
      <ul>
        <li>Формула Хартли: I = log₂N, где N — количество равновероятных событий.</li>
        <li>Формула Шеннона: I = -∑ pᵢ log₂pᵢ (для неравновероятных событий).</li>
      </ul>
      
      <b>Единицы измерения</b>: бит, байт (8 бит), Кбайт (1024 байта), Мбайт, Гбайт.`,
      
      logic: `<b>Алгебра логики</b> оперирует высказываниями, которые могут быть истинными (1) или ложными (0).
      
      <b>Основные логические операции</b>:
      <ul>
        <li>Конъюнкция (И, ∧): 1 ∧ 1 = 1, иначе 0.</li>
        <li>Дизъюнкция (ИЛИ, ∨): 0 ∨ 0 = 0, иначе 1.</li>
        <li>Отрицание (НЕ, ¬): ¬1 = 0, ¬0 = 1.</li>
        <li>Импликация (→): A → B = ¬A ∨ B.</li>
        <li>Эквиваленция (∼): A ∼ B = (A ∧ B) ∨ (¬A ∧ ¬B).</li>
      </ul>
      
      <b>Законы алгебры логики</b>:
      <ul>
        <li>Закон двойного отрицания: ¬(¬A) = A.</li>
        <li>Законы де Моргана: ¬(A ∧ B) = ¬A ∨ ¬B; ¬(A ∨ B) = ¬A ∧ ¬B.</li>
        <li>Распределительный закон: A ∧ (B ∨ C) = (A ∧ B) ∨ (A ∧ C).</li>
        <li>Законы поглощения: A ∧ (A ∨ B) = A; A ∨ (A ∧ B) = A.</li>

      <b>Таблицы истинности</b> строятся для всех возможных наборов значений переменных.`,
      
      systems: `<b>Позиционная система счисления</b> — система, в которой значение цифры зависит от её позиции.

      <b>Восьмеричная система</b> (основание 8): цифры 0-7.<br>
      <b>Шестнадцатеричная система</b> (основание 16): цифры 0-9, A=10, B=11, C=12, D=13, E=14, F=15.
      
      <b>Перевод из десятичной в двоичную</b>:
      Последовательно делить на 2, записывая остатки. Записать остатки в обратном порядке.
      
      <b>Перевод из двоичной в восьмеричную</b>: разбить на триады справа налево, каждую триаду заменить восьмеричной цифрой.<br>
      <b>Перевод из двоичной в шестнадцатеричную</b>: разбить на тетрады.
      
      <b>Арифметика в двоичной системе</b>:
      <ul>
        <li>0+0=0, 0+1=1, 1+1=10 (единица переносится в следующий разряд)</li>

      </ul>`,
      
      graphs: `<b>Граф</b> — это набор вершин и соединяющих их рёбер.
      
      <b>Основные понятия</b>:
      <ul>
        <li>Неориентированный граф — рёбра не имеют направления.</li>

        <li>Вес ребра — числовая характеристика (длина, стоимость).</li>
      </ul>
      
      <b>Поиск кратчайшего пути</b>:
      <ul>
        <li>Алгоритм Дейкстры (для графов с неотрицательными весами).</li>

      </ul>
      
      <b>Рекурсия</b> — вызов функцией самой себя. Пример: вычисление факториала, чисел Фибоначчи.`,

      <b>Основные конструкции</b>:
      <ul>
        <li>Ввод/вывод данных.</li>

      { id: "inf-2", themeId: "coding", title: "Задание 2 (ФИПИ)", diff: "Средне", diffType: "warn", 
        prompt: "Для кодирования букв А, Б, В, Г решили использовать неравномерный двоичный код, удовлетворяющий условию Фано. Для буквы А использовали кодовое слово 0, для буквы Б — 110. Какова наименьшая возможная суммарная длина всех четырёх кодовых слов?",
        answer: "9",

    function setHeader({ title, subtitle="", canBack=false, showBell=true }){

        ? `<button class="icon-btn" id="btnBell" aria-label="Уведомления" style="position:relative">${icon("bell")}${unread>0 ? `<span class="badge" aria-label="Непрочитанные">${unread}</span>` : ""}</button>`
        : `<span style="width:42px;height:42px"></span>`;

      $header.innerHTML = `
        ${left}
        <div class="header-stack">
          <div class="header-title">${escapeHtml(title)}</div>
          ${subtitle ? `<div class="header-sub">${escapeHtml(subtitle)}</div>` : ""}
        </div>
        ${right}
      `;

    function avatarMarkup(auth){
      const name = auth?.name || "Гость";
      const letter = name.trim().slice(0,1).toUpperCase() || "S";
      const bg = auth?.avatar || "linear-gradient(180deg, var(--brand), var(--brand-2))";
      return `<span aria-hidden="true" style="width:24px;height:24px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:1100;background:${bg};box-shadow:0 10px 18px rgba(37,99,235,.25)">${escapeHtml(letter)}</span>`;
    }

    function toast(title, message, type="ok"){
      $toast.innerHTML = `
        <div class="bubble ${type}">
          ${type==="ok" ? icon("check") : icon("x")}
          <div style="min-width:0">
            <span>${escapeHtml(title)}</span>
            <small>${escapeHtml(message)}</small>
          </div>
        </div>
      `;
      clearTimeout(toast._t);
      toast._t = setTimeout(()=> { $toast.innerHTML = ""; }, 2600);
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function applyTheme(theme){
      document.body.classList.toggle("theme-dark", theme === "dark");

    function countUnread(){
      let n = 0;
      for(const k in state.unreadMessages){ if(state.unreadMessages[k]) n++; }

      }
      $tabbar.classList.remove("hide");

      const h = (location.hash || "#/subjects").replace(/^#/, "");
      const parts = h.split("?")[0].split("/").filter(Boolean);
      const [r1, r2] = parts;

      if(!r1){ go("#/subjects", true); return; }

      setActiveTab(r1);

      if(r1 === "subjects"){ setHeader({ title: "Предметы", subtitle: auth.name, canBack:false, showBell:true }); renderSubjects(); return; }
      if(r1 === "exam"){ setHeader({ title: "Экзамен", subtitle: "Тренировка в формате ЕГЭ", canBack:false, showBell:true }); renderExam(); return; }
      if(r1 === "progress"){ setHeader({ title: "Прогресс", subtitle: "Достижения и рейтинг", canBack:false, showBell:true }); renderProgress(); return; }
      if(r1 === "messages"){ setHeader({ title: "Сообщения", subtitle: "Подсказки и напоминания", canBack:false, showBell:true }); renderMessages(); return; }
      if(r1 === "settings"){ setHeader({ title: "Настройки", subtitle: "Тема и аккаунт", canBack:false, showBell:true }); renderSettings(); return; }

      if(r1 === "subject" && r2 === "inf"){
        const qs = new URLSearchParams((location.hash.split("?")[1]||""));
        const tab = qs.get("tab") || "theory";
        setHeader({ title: "Информатика", subtitle: tab === "theory" ? "Теория" : "Практика", canBack:true, showBell:true });
        renderSubjectInf(tab);
        return;
      }

      if(r1 === "subject" && r2 === "math_base"){
        const qs = new URLSearchParams((location.hash.split("?")[1]||""));
        const tab = qs.get("tab") || "theory";
        setHeader({ title: "Математика (база)", subtitle: tab === "theory" ? "Теория" : "Практика", canBack:true, showBell:true });
        renderSubjectMathBase(tab);
        return;
      }

      if(r1 === "task" && r2){
        const taskInf = TASKS_INF.find(t => t.id === r2);
        const taskMath = TASKS_MATH_BASE.find(t => t.id === r2);
        const task = taskInf || taskMath;
        if(!task){ go("#/subjects"); return; }
        const subjectTitle = taskInf ? "Информатика" : "Математика (база)";
        setHeader({ title: "Задание", subtitle: subjectTitle, canBack:true, showBell:false });
        renderTask(task);
        return;
      }

      if(r1 === "exam" && r2 === "start"){
        // Запуск экзамена по предмету из query
        const qs = new URLSearchParams((location.hash.split("?")[1]||""));
        const subject = qs.get("subject");
        if (subject && (subject === "inf" || subject === "math_base")) {
          startExam(subject);
        } else {
          go("#/exam");
        }
        return;
      }

      if(r1 === "exam" && r2 === "result"){
        renderExamResult();
        return;
      }

      go("#/subjects", true);
    }

    function go(hash, replace=false){
      if(replace) {
        location.replace(hash);
      } else {
        if (location.hash === hash) {
          route();
        } else {
          location.hash = hash;
        }
      }
    }

    function setActiveTab(tab){
      const tabs = Array.from(document.querySelectorAll(".tab"));
      tabs.forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
      if(tab === "subject" || tab === "task" || tab === "exam"){
        tabs.forEach(t => t.classList.remove("active"));
        const examTab = tabs.find(t => t.dataset.tab === "exam");
        if (examTab && tab === "exam") examTab.classList.add("active");
      }
    }

      const tab = e.target.closest(".tab")?.dataset?.tab;
      if(!tab) return;

    });

    function subjectCard(s, clickable){

          <div class="bar" aria-hidden="true"><i data-bar="${s.id}" style="width:${s.progress}%"></i></div>
        </div>
      `;
    }

    function hydrateProgressBars(){
      requestAnimationFrame(()=>{
        document.querySelectorAll("[data-bar]").forEach(i=>{
          const id = i.getAttribute("data-bar");
          const s = state.subjects.find(x=>x.id===id);
          i.style.width = (s?.progress ?? 0) + "%";
        });
      });

      document.querySelectorAll("[data-open]").forEach(el=>{
        el.addEventListener("click", ()=>{
          const id = el.getAttribute("data-open");
          if(id === "inf") go("#/subject/inf?tab=theory");
          else if(id === "math_base") go("#/subject/math_base?tab=theory");
          else toast("Скоро", "Этот предмет в прототипе пока как заглушка.", "bad");

      });

    function startExam(subjectId, count = 5, minutes = 30) {
      const tasks = subjectId === 'inf' ? TASKS_INF : TASKS_MATH_BASE;
      // Случайная выборка count заданий
      const shuffled = [...tasks].sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0, Math.min(count, tasks.length));
      state.examMode = {
        subjectId,
        tasks: selected.map(t => t.id),
        currentIndex: 0,
        answers: new Array(selected.length).fill(null), // null - не отвечено, иначе строка ответа
        startTime: Date.now(),
        totalTime: minutes * 60 // секунд
      };
      saveState(state);
      go("#/exam/start"); // переходим к первому заданию
    }

    function renderExamCurrent() {
      if (!state.examMode) {

        // Завершить экзамен
        finishExam();
        return;
      }

      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const remain = Math.max(0, totalTime - elapsed);
      const solvedAlready = !!state.solved[task.id];

      $main.innerHTML = `

          <div class="hint" id="examHintBox">${escapeHtml(task.hint)}</div>
        </div>
      `;

      const timerInterval = setInterval(() => {
        const elapsedNow = Math.floor((Date.now() - startTime) / 1000);
        const remainNow = Math.max(0, totalTime - elapsedNow);
        const timerEl = document.getElementById("examTimer");
        if (timerEl) {
          timerEl.textContent = formatTime(remainNow);
          timerEl.style.color = remainNow < 60 ? 'var(--danger)' : '';
        }
        if (remainNow <= 0) {
          clearInterval(timerInterval);
          finishExam();
        }
      }, 1000);

      document.getElementById("prevExamBtn")?.addEventListener("click", () => {
        saveExamAnswer(task.id, document.getElementById("examAnswer").value);
        state.examMode.currentIndex--;
        saveState(state);
        renderExamCurrent();
      });

      document.getElementById("nextExamBtn")?.addEventListener("click", () => {
        saveExamAnswer(task.id, document.getElementById("examAnswer").value);
        if (currentIndex === tasks.length - 1) {
          clearInterval(timerInterval);
          finishExam();
        } else {
          state.examMode.currentIndex++;
          saveState(state);
          renderExamCurrent();
        }
      });

      document.getElementById("hintExamBtn")?.addEventListener("click", () => {
        document.getElementById("examHintBox").classList.toggle("show");
      });

      // Сохраняем ответ при вводе (можно и через событие)
      document.getElementById("examAnswer").addEventListener("input", (e) => {
        saveExamAnswer(task.id, e.target.value);
      });

        const idx = tasks.indexOf(id);
        if (idx !== -1) {
          state.examMode.answers[idx] = value;
          saveState(state);
        }
      }
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function finishExam() {
      if (!state.examMode) return;
      const { subjectId, tasks, answers, startTime, totalTime } = state.examMode;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      // Анализ результатов
      const results = tasks.map((taskId, idx) => {
        const task = subjectId === 'inf' ? TASKS_INF.find(t => t.id === taskId) : TASKS_MATH_BASE.find(t => t.id === taskId);
        const userAnswer = answers[idx] ? normalizeAnswer(answers[idx]) : null;
        const correct = task ? normalizeAnswer(task.answer) : null;
        const isCorrect = userAnswer === correct;
        return {
          task,
          userAnswer: answers[idx] || '(нет ответа)',
          correct: task ? task.answer : '',
          isCorrect
        };
      });

      const correctCount = results.filter(r => r.isCorrect).length;

      // Сохраняем результаты в состоянии для показа
      state.examResults = results;
      state.examMode = null; // сбрасываем режим
      saveState(state);
      go("#/exam/result");
    }

    function recomputeProgress(){
      const solvedInf = TASKS_INF.filter(t => state.solved[t.id]).length;
      const totalInf = TASKS_INF.length;
      const pctInf = totalInf ? Math.round((solvedInf / totalInf) * 100) : 0;
      const infProgress = pctInf;

      const solvedMath = TASKS_MATH_BASE.filter(t => state.solved[t.id]).length;
      const totalMath = TASKS_MATH_BASE.length;
      const pctMath = totalMath ? Math.round((solvedMath / totalMath) * 100) : 0;
      const mathProgress = pctMath;

      state.subjects = state.subjects.map(s => {
        if(s.id === "inf") return { ...s, progress: infProgress };
        if(s.id === "math_base") return { ...s, progress: mathProgress };
        return s;
      });

      const overall = Math.round(state.subjects.reduce((a,s)=>a+s.progress,0) / state.subjects.length);
      return overall;
    }

    function recomputeAchievements(){
      const solvedCount = [...TASKS_INF, ...TASKS_MATH_BASE].filter(t => state.solved[t.id]).length;
      state.achievements.first = solvedCount >= 1;
      state.achievements.three = solvedCount >= 3;
      state.achievements.five = solvedCount >= 5;

      `;

      const donut = document.getElementById("donut");
      donut.style.background = `conic-gradient(var(--brand) 0deg ${angle}deg, color-mix(in srgb, var(--border) 55%, transparent) ${angle}deg 360deg)`;
    }

    function achRow(name, desc, earned){
      return `
        <div class="card ach-item ${earned ? "" : "locked"}">
          <div class="ach-left">
            <div class="medal" aria-hidden="true">🏅</div>
            <div>
              <div class="ach-name">${escapeHtml(name)}</div>
              <div class="ach-desc">${escapeHtml(desc)}</div>
            </div>
          </div>
          <span class="chip ${earned ? "ok" : ""}">${earned ? "Получено" : "Закрыто"}</span>
        </div>
      `;
    }

    function renderMessages(){
      const unread = countUnread();
      $main.innerHTML = `
        <div class="card pad">
          <div class="row">
            <div>
              <div style="font-weight:1100">Входящие</div>
              <div class="muted" style="font-weight:750;font-size:12.5px;margin-top:3px">Непрочитано: <strong>${unread}</strong></div>
            </div>
            <button class="btn" id="markAll">Прочитать всё</button>
          </div>
        </div>
        <div class="sp"></div>
        <div class="list" aria-label="Сообщения">
          ${state.messages.map(m => msgRow(m)).join("")}
        </div>
      `;

      document.getElementById("markAll").addEventListener("click", ()=>{
        for(const k in state.unreadMessages){ state.unreadMessages[k] = false; }
        saveState(state);
        toast("Готово", "Все сообщения прочитаны.", "ok");
        route();
      });

      document.querySelectorAll("[data-msg]").forEach(el=>{
        el.addEventListener("click", ()=>{
          const id = el.getAttribute("data-msg");
          state.unreadMessages[id] = false;
          saveState(state);
          toast("Открыто", "Сообщение отмечено как прочитанное.", "ok");
          route();
        });
      });
    }

    function msgRow(m){
      const unread = !!state.unreadMessages[m.id];
      return `
        <div class="card msg" data-msg="${m.id}">
          <div class="row">
            <div class="msg-title">${escapeHtml(m.title)}</div>
            ${unread ? `<span class="dot" aria-label="Непрочитано"></span>` : `<span class="chip ok">прочитано</span>`}
          </div>
          <div class="msg-text">${escapeHtml(m.text)}</div>
        </div>
      `;
    }

    function renderSettings(){
      const theme = state.theme;
      $main.innerHTML = `
        <div class="card pad">
          <div class="row">
            <div>
              <div style="font-weight:1100">Тема</div>
              <div class="muted" style="font-weight:750;font-size:12.5px;margin-top:3px">
                Переключение светлой/тёмной темы
              </div>
            </div>
            <button class="btn" id="toggleTheme">${theme === "dark" ? "Тёмная" : "Светлая"}</button>
          </div>
          <div class="divider"></div>
          <div class="row">
            <div>
              <div style="font-weight:1100">Сбросить прогресс</div>
              <div class="muted" style="font-weight:750;font-size:12.5px;margin-top:3px">Очистить все решённые задания</div>
            </div>
            <button class="btn" id="resetBtn">Сброс</button>
          </div>
          <div class="divider"></div>
          <div class="row">
            <div>
              <div style="font-weight:1100">Аккаунт</div>
              <div class="muted" style="font-weight:750;font-size:12.5px;margin-top:3px">Выход из аккаунта</div>
            </div>
            <button class="btn ghost" id="logoutBtn">Выйти</button>
          </div>
        </div>
        <div class="sp"></div>
        <div class="card pad">
          <div style="font-weight:1100">Обновление контента</div>
          <div class="muted" style="font-weight:750;font-size:12.5px;margin-top:6px;line-height:1.4">
            • Режим «Экзамен» (случайная выборка, таймер, разбор)<br>
            • Избранное и работа над ошибками<br>
            • Статистика по темам<br>
            • Поддержка разных форматов ответов<br>
            • Источники: ФИПИ, «Решу ЕГЭ»
          </div>
        </div>
      `;

      document.getElementById("toggleTheme").addEventListener("click", ()=>{
        state.theme = state.theme === "dark" ? "light" : "dark";
        applyTheme(state.theme);
        saveState(state);
        toast("Тема", "Переключено на " + (state.theme==="dark" ? "тёмную" : "светлую") + ".", "ok");
        route();
      });

      document.getElementById("resetBtn").addEventListener("click", ()=>{
        if(confirm("Сбросить прогресс и достижения?")){
          const newState = structuredClone(DEFAULT_STATE);
          newState.theme = document.body.classList.contains("theme-dark") ? "dark" : "light";
          state = newState;
          saveState(state);
          toast("Сброс", "Прогресс очищен.", "ok");
          route();
        }
      });

      document.getElementById("logoutBtn").addEventListener("click", ()=>{
        clearAuth();
        toast("Выход", "Сессия завершена.", "ok");
        setTimeout(()=> route(), 350);
      });
    }

    // =========================================================
    // Старт
    // =========================================================
    if(!location.hash) location.hash = "#/subjects";
    route();
  </script>
</body>

</html>
