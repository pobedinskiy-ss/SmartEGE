              </div>
            </div>
            <button class="btn" id="toPracticeInf">К практике</button>
          </div>
        </div>
      `;
    }

    function accItem(title, theoryText, items, taskCount, openClass){
      const taskText = taskCount > 0 ? ` (${taskCount} заданий)` : '';
      return `
        <div class="acc-item ${openClass}">
          <div class="acc-head" role="button" aria-label="Открыть тему">
            <div style="display:flex;flex-direction:column;gap:2px;min-width:0">
              <strong>${escapeHtml(title)}${escapeHtml(taskText)}</strong>
              <span>${items.length} подтемы</span>
            </div>
            <span class="chip">▼</span>
          </div>
          <div class="acc-body">
            <ul>${items.map(x => `<li>${escapeHtml(x)}</li>`).join("")}</ul>
            <div class="theory-text">${theoryText}</div>
          </div>
        </div>
      `;
    }

    function renderInfPractice(){
      const solvedCount = TASKS_INF.filter(t => state.solved[t.id]).length;
      const total = TASKS_INF.length;
      const pct = total ? Math.round((solvedCount/total)*100) : 0;

      let filteredTasks = [...TASKS_INF];
      if (state.selectedThemeInf) {
        const theme = THEMES_INF.find(t => t.id === state.selectedThemeInf);
        if (theme) filteredTasks = filteredTasks.filter(t => t.themeId === theme.id);
      }
      if (state.showOnlyUnsolvedInf) {
        filteredTasks = filteredTasks.filter(t => !state.solved[t.id]);
      }
      if (state.showOnlyFavoritesInf) {
        filteredTasks = filteredTasks.filter(t => state.favorites.includes(t.id));
      }

      const getThemeProgress = (themeId) => {
        const totalInTheme = TASKS_INF.filter(t => t.themeId === themeId).length;
        const solvedInTheme = TASKS_INF.filter(t => t.themeId === themeId && state.solved[t.id]).length;
        return totalInTheme ? ` ${solvedInTheme}/${totalInTheme}` : '';
      };

      return `
        <div class="section-title">Практика <span class="chip">${solvedCount}/${total} решено</span></div>
        <div class="card pad">
          <div class="row">
            <div>
              <div style="font-weight:1100">Прогресс</div>
              <div class="muted" style="font-weight:750;font-size:12.5px;margin-top:3px">Решай задания, получай достижения</div>
            </div>
            <span class="chip">${pct}%</span>
          </div>
          <div class="bar" aria-hidden="true" style="margin-top:10px"><i style="width:${pct}%"></i></div>
        </div>
        <div class="theme-scroll">
          <span class="chip ${!state.selectedThemeInf ? 'active' : ''}" data-theme-filter-inf="all">Все темы</span>
          ${THEMES_INF.map(t => `<span class="chip ${state.selectedThemeInf === t.id ? 'active' : ''}" data-theme-filter-inf="${t.id}">${escapeHtml(t.name)}${getThemeProgress(t.id)}</span>`).join('')}
        </div>
        <div class="row" style="margin-bottom:12px;flex-wrap:wrap;gap:8px;">
          <label style="display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px;">
            <input type="checkbox" id="filterUnsolvedInf" ${state.showOnlyUnsolvedInf ? 'checked' : ''}> Только нерешённые
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px;">
            <input type="checkbox" id="filterFavoritesInf" ${state.showOnlyFavoritesInf ? 'checked' : ''}> ⭐ Избранные
          </label>
          <button class="btn ghost" style="height:36px;padding:0 12px;" id="resetFiltersInf">Сбросить фильтры</button>
        </div>
        <div class="list" aria-label="Список заданий">
          ${filteredTasks.length ? filteredTasks.map(t => taskRow(t, 'inf')).join('') : '<div class="card pad muted" style="text-align:center;">Нет заданий по выбранным фильтрам</div>'}
        </div>
      `;
    }

    function taskRow(t, subjectId){
      const solved = !!state.solved[t.id];
      const status = solved ? `<span class="chip ok">Решено</span>` : `<span class="chip">Не решено</span>`;
      const isFav = state.favorites.includes(t.id);
      const favStar = `<span class="fav-star ${isFav ? 'active' : ''}" data-fav="${t.id}">${isFav ? '★' : '☆'}</span>`;
      let themeName = '';
      if (subjectId === 'inf') {
        const theme = THEMES_INF.find(th => th.id === t.themeId);
        themeName = theme ? theme.name : '';
      }
      return `
        <div class="card task" data-task="${t.id}">
          <div style="flex:1">
            <div class="t-title">${escapeHtml(t.title)}</div>
            <div class="t-sub">${escapeHtml(t.prompt)}</div>
            <div style="margin-top:6px; display:flex; gap:6px; flex-wrap:wrap;">
              <span class="chip ${t.diffType}">${escapeHtml(t.diff)}</span>
              ${themeName ? `<span class="chip">${escapeHtml(themeName)}</span>` : ''}
            </div>
          </div>
          <div class="meta">
            ${favStar}
            ${status}
          </div>
        </div>
      `;
    }

    function toggleFavorite(taskId) {
      const index = state.favorites.indexOf(taskId);
      if (index === -1) {
        state.favorites.push(taskId);
        toast("Добавлено в избранное", "⭐", "ok");
      } else {
        state.favorites.splice(index, 1);
        toast("Удалено из избранного", "", "info");
      }
      saveState(state);
    }

    // ---- ЗАДАНИЕ ----
    function renderTask(task){
      const DURATION = 5 * 60;
      let remain = DURATION;
      clearInterval(renderTask._timer);

      const solvedAlready = !!state.solved[task.id];
      const isFav = state.favorites.includes(task.id);
      const attempts = state.attempts[task.id] || 0;

      const canShowSolution = solvedAlready || attempts >= 3;

      const solutionSteps = task.solution ? task.solution.split('\n').filter(s => s.trim()) : [];

      $main.innerHTML = `
        <div class="card pad">
          <div class="row">
            <div style="min-width:0">
              <div class="q-title">${escapeHtml(task.title)}</div>
              <div class="q-text">${escapeHtml(task.prompt)}</div>
            </div>
            <div class="timer" id="timer" aria-label="Таймер">05:00</div>
          </div>
          <div class="row" style="margin-top:8px;">
            <span class="chip ${task.diffType}">${escapeHtml(task.diff)}</span>
            <span class="fav-star ${isFav ? 'active' : ''}" data-fav="${task.id}" style="font-size:24px; cursor:pointer;">${isFav ? '★' : '☆'}</span>
          </div>
          <div class="divider"></div>
          <label style="display:block;font-weight:900;margin-bottom:8px">Ответ</label>
          <input class="input" id="answer" placeholder="Введите ответ..." inputmode="text" autocomplete="off"/>
          <div class="sp"></div>
          <div class="row" style="gap:10px;align-items:stretch">
            <button class="btn primary" style="flex:1" id="checkBtn">Проверить</button>
            <button class="btn" style="width:140px" id="hintBtn">Подсказка</button>
          </div>
          <div class="hint" id="hintBox" role="note">${escapeHtml(task.hint)}</div>

          <div id="solutionBox" style="display:none; margin-top:10px;">
            <div class="step-solution">
              ${solutionSteps.length ? solutionSteps.map((step, i) => `
                <div class="step">
                  <span class="step-num">${i+1}</span>
                  ${escapeHtml(step)}
                </div>
              `).join('') : `<div class="step">${escapeHtml(task.hint)}</div>`}
            </div>
          </div>

          <button id="showSolutionBtn" style="display:${canShowSolution ? 'inline-flex' : 'none'}; margin-top:10px;" class="btn ghost">📖 Показать решение</button>

          <div class="row" style="margin-top:10px;">
            <span class="chip ${solvedAlready ? "ok" : ""}">${solvedAlready ? "✅ Решено" : `❌ Не решено (попыток: ${attempts})`}</span>
            <button class="btn ghost" id="backToList">К списку</button>
          </div>
        </div>
      `;

      const $timer = document.getElementById("timer");
      const $answer = document.getElementById("answer");
      const $hintBox = document.getElementById("hintBox");
      const $hintBtn = document.getElementById("hintBtn");
      const $solutionBox = document.getElementById("solutionBox");
      const $showSolutionBtn = document.getElementById("showSolutionBtn");

      function fmt(t){
        const m = String(Math.floor(t/60)).padStart(2,"0");
        const s = String(t%60).padStart(2,"0");
        return m + ":" + s;
      }

      renderTask._timer = setInterval(()=>{
        remain--;
        $timer.textContent = fmt(Math.max(0, remain));
        if(remain <= 0){
          clearInterval(renderTask._timer);
          toast("Время вышло", "Можно попробовать ещё раз.", "bad");
        }
      }, 1000);

      document.getElementById("backToList").addEventListener("click", ()=>{
        if (task.id.startsWith("inf")) go("#/subject/inf?tab=practice");
        else go("#/subjects");
      });

      document.querySelector("[data-fav]").addEventListener("click", (e)=>{
        e.stopPropagation();
        toggleFavorite(task.id);
        renderTask(task);
      });

      $hintBtn.addEventListener("click", ()=>{
        $hintBox.classList.toggle("show");
        if ($hintBox.classList.contains("show")) {
          $solutionBox.style.display = "none";
        }
      });

      $showSolutionBtn.addEventListener("click", ()=>{
        if ($solutionBox.style.display === "none") {
          $solutionBox.style.display = "block";
          $hintBox.classList.remove("show");
        } else {
          $solutionBox.style.display = "none";
        }
      });

      document.getElementById("checkBtn").addEventListener("click", ()=>{
        const user = normalizeAnswer($answer.value);
        const correct = normalizeAnswer(task.answer);

        $answer.classList.remove("input-error");
        $hintBox.classList.remove("show");

        if(user === correct){
          markSolved(task.id);
          updateMiniGoals('task');
          toast("✅ Верно!", "Задание засчитано. Можно посмотреть решение.", "ok");
          $solutionBox.style.display = "block";
          $showSolutionBtn.style.display = "inline-flex";
        }else{
          const newAttempts = (state.attempts[task.id] || 0) + 1;
          state.attempts[task.id] = newAttempts;
          saveState(state);

          toast("❌ Неверно", "Ошибка записана в раздел «Мои ошибки»", "bad");
          $answer.classList.add("input-error");

          const topic = THEMES_INF.find(t => t.id === task.themeId);
          const topicId = topic ? topic.id : 'unknown';
          addMistake(topicId, task.prompt, task.answer, task.hint, $answer.value);
          updateTopicStats(topicId, false);

          if (newAttempts >= 3) {
            $showSolutionBtn.style.display = "inline-flex";
            toast("3 ошибки", "Теперь можно посмотреть решение.", "ok");
          } else {
            $solutionBox.style.display = "none";
            $showSolutionBtn.style.display = "none";
          }
          const statusEl = document.querySelector(".row .chip:first-child");
          if (statusEl) {
            statusEl.textContent = `❌ Не решено (попыток: ${newAttempts})`;
          }
        }
      });

      $answer.addEventListener("keydown", (e)=>{
        if(e.key === "Enter") document.getElementById("checkBtn").click();
      });
      $answer.addEventListener("focus", ()=>{
        $answer.classList.remove("input-error");
      });
      setTimeout(()=> $answer.focus(), 50);
    }

    // ---- ЭКЗАМЕН ----
    function renderExam() {
      const totalTasks = TASKS_INF.length;
      $main.innerHTML = `
        <div class="card pad">
          <div style="font-weight:1100; margin-bottom:12px;">Пробный ЕГЭ по информатике</div>
          <p class="muted" style="margin-bottom:16px;">Выберите количество заданий и время. Все задания из актуального банка ФИПИ.</p>
          <div class="grid" style="margin-bottom:16px;">
            <div class="card subject" data-exam-subject="inf">
              <div class="s-ico" style="margin-bottom:8px;">💻</div>
              <div class="name">Информатика</div>
              <div class="pct">${totalTasks} заданий доступно</div>
            </div>
          </div>
          <div style="margin-bottom:16px;">
            <label style="display:block; font-weight:800; margin-bottom:6px;">Количество заданий (макс. ${Math.min(totalTasks, 27)})</label>
            <input type="number" id="examCount" min="1" max="${Math.min(totalTasks, 27)}" value="${Math.min(totalTasks, 10)}" class="input" style="width:100px;">
          </div>
          <div style="margin-bottom:16px;">
            <label style="display:block; font-weight:800; margin-bottom:6px;">Время (минут)</label>
            <input type="number" id="examTime" min="5" max="235" value="235" class="input" style="width:100px;">
            <span class="muted" style="font-size:12px;margin-left:8px;">(по умолчанию 235 минут = 3ч 55м)</span>
          </div>
          <button class="btn primary full" id="startExamBtn">🚀 Начать экзамен</button>
        </div>
      `;
      document.getElementById("startExamBtn").addEventListener("click", () => {
        const count = parseInt(document.getElementById("examCount").value) || Math.min(totalTasks, 10);
        const time = parseInt(document.getElementById("examTime").value) || 235;
        startExam("inf", count, time);
      });
    }

    function startExam(subjectId, count = 10, minutes = 235) {
      const tasks = TASKS_INF;
      const shuffled = [...tasks].sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0, Math.min(count, tasks.length));
      state.examMode = {
        subjectId,
        tasks: selected.map(t => t.id),
        currentIndex: 0,
        answers: new Array(selected.length).fill(null),
        startTime: Date.now(),
        totalTime: minutes * 60,
        finished: false
      };
      saveState(state);
      go("#/exam/start");
    }

    function renderExamCurrent() {
      if (!state.examMode || state.examMode.finished) {
        go("#/exam");
        return;
      }
      const { subjectId, tasks, currentIndex, answers, totalTime, startTime } = state.examMode;
      const taskId = tasks[currentIndex];
      const task = TASKS_INF.find(t => t.id === taskId);
      if (!task) {
        finishExam();
        return;
      }

      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const remain = Math.max(0, totalTime - elapsed);
      const solvedAlready = !!state.solved[task.id];

      let dots = tasks.map((id, idx) => {
        const ans = answers[idx];
        let cls = 'exam-dot';
        if (idx === currentIndex) cls += ' current';
        else if (ans && ans.trim()) cls += ' done';
        return `<span class="${cls}" data-exam-idx="${idx}">${idx+1}</span>`;
      }).join('');

      $main.innerHTML = `
        <div class="card pad">
          <div class="row">
            <div style="min-width:0">
              <div class="q-title">Задание ${currentIndex+1} из ${tasks.length}</div>
              <div class="q-text">${escapeHtml(task.prompt)}</div>
            </div>
            <div class="timer" id="examTimer" style="${remain < 600 ? 'color:var(--danger);' : ''}">${formatTime(remain)}</div>
          </div>
          <div class="exam-progress">${dots}</div>
          <div class="row" style="margin-top:4px;margin-bottom:8px;">
            <span class="chip ${task.diffType}">${escapeHtml(task.diff)}</span>
            <span class="chip">${task.themeId ? (THEMES_INF.find(t=>t.id===task.themeId)?.name || '') : ''}</span>
          </div>
          <div class="divider"></div>
          <label style="display:block;font-weight:900;margin-bottom:8px">Ответ</label>
          <input class="input" id="examAnswer" placeholder="Введите ответ..." value="${answers[currentIndex] || ''}" inputmode="text" autocomplete="off"/>
          <div class="sp"></div>
          <div class="row" style="gap:10px;">
            <button class="btn secondary" style="flex:1" id="prevExamBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Назад</button>
            <button class="btn primary" style="flex:1" id="nextExamBtn">${currentIndex === tasks.length-1 ? '📊 Завершить' : 'Далее ▶'}</button>
          </div>
          <div class="sp"></div>
          <button class="btn ghost" id="hintExamBtn">Подсказка</button>
          <div class="hint" id="examHintBox">${escapeHtml(task.hint)}</div>
          <button class="btn ghost" id="solutionExamBtn" style="margin-top:6px;">📘 Решение</button>
          <div id="examSolutionBox" style="display:none;margin-top:8px;">
            <div class="step-solution">
              ${task.solution ? task.solution.split('\n').filter(s=>s.trim()).map((s,i) => `
                <div class="step"><span class="step-num">${i+1}</span>${escapeHtml(s)}</div>
              `).join('') : `<div class="step">${escapeHtml(task.hint)}</div>`}
            </div>
          </div>
        </div>
      `;

      const timerInterval = setInterval(() => {
        if (state.examMode?.finished) { clearInterval(timerInterval); return; }
        const elapsedNow = Math.floor((Date.now() - state.examMode.startTime) / 1000);
        const remainNow = Math.max(0, state.examMode.totalTime - elapsedNow);
        const timerEl = document.getElementById("examTimer");
        if (timerEl) {
          timerEl.textContent = formatTime(remainNow);
          timerEl.style.color = remainNow < 600 ? 'var(--danger)' : '';
        }
        if (remainNow <= 0) {
          clearInterval(timerInterval);
          toast("Время вышло!", "Экзамен завершён.", "bad");
          finishExam();
        }
      }, 1000);

      document.querySelectorAll("[data-exam-idx]").forEach(el => {
        el.addEventListener("click", () => {
          const idx = parseInt(el.getAttribute("data-exam-idx"));
          saveExamAnswer(task.id, document.getElementById("examAnswer").value);
          state.examMode.currentIndex = idx;
          saveState(state);
          clearInterval(timerInterval);
          renderExamCurrent();
        });
      });

      document.getElementById("prevExamBtn")?.addEventListener("click", () => {
        saveExamAnswer(task.id, document.getElementById("examAnswer").value);
        state.examMode.currentIndex--;
        saveState(state);
        clearInterval(timerInterval);
        renderExamCurrent();
      });

      document.getElementById("nextExamBtn")?.addEventListener("click", () => {
        saveExamAnswer(task.id, document.getElementById("examAnswer").value);
        if (currentIndex === tasks.length - 1) {
          clearInterval(timerInterval);
          finishExam();
        } else {
          state.examMode.currentIndex++;
          saveState(state);
          clearInterval(timerInterval);
          renderExamCurrent();
        }
      });

      document.getElementById("hintExamBtn")?.addEventListener("click", () => {
        document.getElementById("examHintBox").classList.toggle("show");
        document.getElementById("examSolutionBox").style.display = "none";
      });

      document.getElementById("solutionExamBtn")?.addEventListener("click", () => {
        const box = document.getElementById("examSolutionBox");
        box.style.display = box.style.display === "none" ? "block" : "none";
        document.getElementById("examHintBox").classList.remove("show");
      });

      document.getElementById("examAnswer").addEventListener("input", (e) => {
        saveExamAnswer(task.id, e.target.value);
      });

      function saveExamAnswer(id, value) {
        if (!state.examMode) return;
        const idx = state.examMode.tasks.indexOf(id);
        if (idx !== -1) {
          state.examMode.answers[idx] = value;
          saveState(state);
        }
      }
    }

    function formatTime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function finishExam() {
      if (!state.examMode) return;
      const { subjectId, tasks, answers, startTime } = state.examMode;
      state.examMode.finished = true;
      const results = tasks.map((taskId, idx) => {
        const task = TASKS_INF.find(t => t.id === taskId);
        const userAnswer = answers[idx] ? normalizeAnswer(answers[idx]) : null;
        const correct = task ? normalizeAnswer(task.answer) : null;
        const isCorrect = userAnswer === correct;
        if (task) {
          const theme = THEMES_INF.find(t => t.id === task.themeId);
          if (theme) updateTopicStats(theme.id, isCorrect);
        }
        return {
          task,
          userAnswer: answers[idx] || '(нет ответа)',
          correct: task ? task.answer : '',
          hint: task ? task.hint : '',
          isCorrect
        };
      });

      state.examResults = results;
      const correctCount = results.filter(r => r.isCorrect).length;
      const total = results.length;
      const score = total ? Math.round((correctCount/total)*100) : 0;

      // Сохраняем в историю экзаменов
      if (!state.examHistory) state.examHistory = [];
      state.examHistory.unshift({
        date: new Date().toISOString(),
        score: score,
        correct: correctCount,
        total: total,
        subject: subjectId || 'inf'
      });
      if (state.examHistory.length > 20) state.examHistory.pop();
      updateMiniGoals('exam');

      // Достижение "Первый экзамен"
      if (!state.achievements.firstExam) {
        state.achievements.firstExam = true;
        addNotification("🏆 Достижение", "Первый экзамен пройден!", "#/achievements");
        toast("🏆 Достижение!", "Первый экзамен пройден!", "ok");
      }
      saveState(state);
      go("#/exam/result");
    }

    function renderExamResult() {
      const results = state.examResults || [];
      const correctCount = results.filter(r => r.isCorrect).length;
      const total = results.length;
      const percent = total ? Math.round((correctCount/total)*100) : 0;

      let grade = 'good';
      let gradeText = 'Отлично!';
      if (percent < 40) { grade = 'bad'; gradeText = 'Нужно больше практики'; }
      else if (percent < 70) { grade = 'ok'; gradeText = 'Хороший результат!'; }

      const themeStats = {};
      results.forEach(r => {
        if (!r.task) return;
        const theme = THEMES_INF.find(t => t.id === r.task.themeId);
        if (!theme) return;
        if (!themeStats[theme.id]) themeStats[theme.id] = { correct: 0, total: 0, name: theme.name };
        themeStats[theme.id].total++;
        if (r.isCorrect) themeStats[theme.id].correct++;
      });
      const strongThemes = [];
      const weakThemes = [];
      for (const id in themeStats) {
        const s = themeStats[id];
        const pct = Math.round((s.correct / s.total) * 100);
        if (pct >= 70) strongThemes.push({ name: s.name, pct });
        else weakThemes.push({ name: s.name, pct });
      }

      const wrongTasks = results.filter(r => !r.isCorrect);

      $main.innerHTML = `
        <div class="card pad">
          <div style="font-weight:1100; font-size:18px; margin-bottom:8px;">📊 Результаты экзамена</div>

          <div class="exam-result-card ${grade}">
            <div style="font-size:28px; font-weight:1100; text-align:center;">${percent}%</div>
            <div style="text-align:center; font-weight:800; font-size:16px;">${gradeText}</div>
            <div class="row" style="margin-top:10px;">
              <span>✅ Правильно: <strong>${correctCount}</strong></span>
              <span>❌ Ошибок: <strong>${total - correctCount}</strong></span>
            </div>
            <div class="bar" style="margin-top:8px;"><i style="width:${percent}%;"></i></div>
          </div>

          <div class="divider"></div>

          <!-- Анализ тем -->
          <div style="font-weight:900; margin-bottom:8px;">Анализ тем</div>
          <div class="row" style="gap:10px;flex-wrap:wrap;">
            ${strongThemes.length ? `
              <div style="flex:1;">
                <div style="font-weight:900;color:var(--success);">✔ Сильные темы</div>
                ${strongThemes.map(t => `<div class="chip ok">${t.name} (${t.pct}%)</div>`).join('')}
              </div>
            ` : '<div class="muted">Нет сильных тем</div>'}
            ${weakThemes.length ? `
              <div style="flex:1;">
                <div style="font-weight:900;color:var(--danger);">⚠ Слабые темы</div>
                ${weakThemes.map(t => `<div class="chip bad">${t.name} (${t.pct}%)</div>`).join('')}
              </div>
            ` : '<div class="muted">Нет слабых тем</div>'}
          </div>

          <button class="btn primary full" style="margin-top:12px;" id="createPlanFromExamBtn">📅 Сформировать план подготовки</button>

          <div class="divider"></div>

          <div style="font-weight:900; margin:10px 0;">Ошибки (${wrongTasks.length})</div>
          ${wrongTasks.length ? `
            <div class="list">
              ${wrongTasks.map((r, idx) => `
                <div class="card" style="padding:10px; border-color:var(--danger);">
                  <div style="font-weight:1000;">${escapeHtml(r.task.title)}</div>
                  <div class="muted" style="font-size:12px;">Тема: ${THEMES_INF.find(t=>t.id===r.task.themeId)?.name || '—'}</div>
                  <div class="row" style="margin-top:4px;">
                    <span class="chip bad">Ваш: ${escapeHtml(r.userAnswer)}</span>
                    <span class="chip ok">Верно: ${escapeHtml(r.correct)}</span>
                  </div>
                  <button class="btn small" style="margin-top:6px;" data-add-mistake="${r.task.id}">➕ Добавить в мои ошибки</button>
                </div>
              `).join('')}
            </div>
          ` : `
            <div class="card pad" style="border-color:var(--success); background:color-mix(in srgb, var(--success) 8%, var(--surface));">
              🎉 Поздравляем! Все задания решены верно!
            </div>
          `}

          <div class="sp"></div>
          <button class="btn secondary full" style="margin-top:6px;" id="backToExam">К выбору экзамена</button>
        </div>
      `;

      document.querySelectorAll("[data-add-mistake]").forEach(btn => {
        btn.addEventListener("click", () => {
          const taskId = btn.getAttribute("data-add-mistake");
          const task = TASKS_INF.find(t => t.id === taskId);
          if (task) {
            const theme = THEMES_INF.find(t => t.id === task.themeId);
            addMistake(theme ? theme.id : 'unknown', task.prompt, task.answer, task.hint || task.solution || '', '');
            toast("Добавлено", "Задание в разделе «Мои ошибки»", "ok");
          }
        });
      });

      document.getElementById("createPlanFromExamBtn")?.addEventListener("click", ()=>{
        // Создаём план из слабых тем
        const weak = getWeakThemes();
        const planTasks = [];
        if (weak.length > 0) {
          weak.slice(0, 2).forEach((w, i) => {
            planTasks.push({ text: `Повторить тему «${w.name}» (точность ${w.pct}%)`, done: false });
          });
        }
        planTasks.push({ text: "Решить 5 заданий по слабым темам", done: false });
        planTasks.push({ text: "Исправить ошибки из экзамена", done: false });
        state.plan.tasks = planTasks;
        saveState(state);
        toast("План создан", "Перейдите во вкладку «План»", "ok");
        go("#/plan");
      });

      document.getElementById("backToExam").addEventListener("click", () => go("#/exam"));
    }

    // ---- ГЕЙМИФИКАЦИЯ ----
    function recomputeProgress(){
      const solvedInf = TASKS_INF.filter(t => state.solved[t.id]).length;
      const totalInf = TASKS_INF.length;
      const pctInf = totalInf ? Math.round((solvedInf / totalInf) * 100) : 0;
      state.subjects = state.subjects.map(s => {
        if(s.id === "inf") return { ...s, progress: pctInf };
        return s;
      });
      return pctInf;
    }

    function recomputeAchievements(){
      const solvedCount = TASKS_INF.filter(t => state.solved[t.id]).length;
      state.achievements.first = solvedCount >= 1;
      state.achievements.three = solvedCount >= 3;
      state.achievements.five = solvedCount >= 5;
      state.achievements.ten = solvedCount >= 10;
      state.achievements.fifty = solvedCount >= 50;
      state.achievements.hundred = solvedCount >= 100;
      const streak = state.streak?.count || 0;
      state.achievements.week = streak >= 7;
      if (state.mistakes.length === 0 && !state.achievements.allMistakes) {
        state.achievements.allMistakes = true;
        addNotification("🏆 Достижение", "Все ошибки исправлены!", "#/achievements");
      }
    }

    function updateStreak() {
      const today = new Date().toDateString();
      if (!state.streak) state.streak = { lastDate: null, count: 0 };
      if (state.streak.lastDate === today) return;
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const isYesterday = state.streak.lastDate === yesterday.toDateString();
      if (isYesterday) {
        state.streak.count++;
      } else {
        state.streak.count = 1;
      }
      state.streak.lastDate = today;
      saveState(state);
    }

    function markSolved(taskId){
      if(state.solved[taskId]) return;
      state.solved[taskId] = true;
      const task = TASKS_INF.find(t => t.id === taskId);
      if (task) {
        const theme = THEMES_INF.find(t => t.id === task.themeId);
        if (theme) {
          updateTopicStats(theme.id, true);
          if (!state.adaptiveStats[theme.id]) state.adaptiveStats[theme.id] = { solved: 0, correct: 0 };
          state.adaptiveStats[theme.id].solved++;
          state.adaptiveStats[theme.id].correct++;
        }
      }
      updateStreak();
      recomputeAchievements();
      recomputeProgress();
      saveState(state);

      const solvedCount = TASKS_INF.filter(t => state.solved[t.id]).length;
      if (solvedCount === 1) { toast("🏆 Достижение!", "Первая пятёрка — открыто!", "ok"); addNotification("🏆 Достижение", "Первая пятёрка", "#/achievements"); }
      if (solvedCount === 3) { toast("🏆 Достижение!", "В ударе — решено 3 задания!", "ok"); addNotification("🏆 Достижение", "В ударе (3 задачи)", "#/achievements"); }
      if (solvedCount === 5) { toast("🏆 Достижение!", "Ударник труда — решено 5 заданий!", "ok"); addNotification("🏆 Достижение", "Ударник труда (5 задач)", "#/achievements"); }
      if (solvedCount === 10) { toast("🏆 Достижение!", "10 задач — круто!", "ok"); addNotification("🏆 Достижение", "10 задач решено", "#/achievements"); }
      if (solvedCount === 50) { toast("🏆 Достижение!", "50 задач — круто!", "ok"); addNotification("🏆 Достижение", "50 задач решено!", "#/achievements"); }
      if (solvedCount === 100) { toast("🏆 Достижение!", "100 задач — вы герой!", "ok"); addNotification("🏆 Достижение", "100 задач решено!", "#/achievements"); }
    }

    function updateTopicStats(topicId, correct) {
      if (!state.topicStats) state.topicStats = {};
      if (!state.topicStats[topicId]) state.topicStats[topicId] = { correct: 0, total: 0 };
      state.topicStats[topicId].total++;
      if (correct) state.topicStats[topicId].correct++;
      saveState(state);
    }

    // =========================================================
    // ТРЕНИРОВКА И ОШИБКИ
    // =========================================================
    let currentTrainingTask = null;
    let currentTopic = null;
    let reviewingMistakeId = null;
    let reviewingMistakesQueue = [];

    function renderTrainingTopicSelector() {
      $main.innerHTML = `
        <div class="section-title">Выберите тему для тренировки</div>
        <div class="grid">
          ${TRAINING_TOPICS.map(t => `
            <div class="card subject" data-topic="${t.id}">
              <div class="s-ico">📘</div>
              <div class="name">${t.name}</div>
            </div>
          `).join('')}
        </div>
        ${state.mistakes.length > 0 ? `
          <div class="divider"></div>
          <button class="btn primary full" id="repeatMistakesBtn">🔄 Повторить все ошибки (${state.mistakes.length})</button>
        ` : ''}
      `;
      document.querySelectorAll("[data-topic]").forEach(el => {
        el.addEventListener("click", () => startTraining(el.getAttribute("data-topic")));
      });
      document.getElementById("repeatMistakesBtn")?.addEventListener("click", () => {
        startMistakesReview();
      });
    }

    function startTraining(topicId) {
      currentTopic = topicId;
      reviewingMistakeId = null;
      reviewingMistakesQueue = [];
      generateNewTask();
      renderTrainingUI();
    }

    function generateNewTask() {
      if (currentTopic && GENERATORS[currentTopic]) {
        currentTrainingTask = GENERATORS[currentTopic]();
        currentTrainingTask.topicId = currentTopic;
      }
    }

    function renderTrainingUI() {
      if (!currentTrainingTask) {
        go("#/subject/inf?tab=training");
        return;
      }
      const task = currentTrainingTask;
      if (!window._trainingAttempts) window._trainingAttempts = {};
      const taskKey = task.text;
      const sessionAttempts = window._trainingAttempts[taskKey] || 0;
      const canShowSolution = sessionAttempts >= 3;

      const review = state.mistakeReview;
      let progressHtml = '';
      if (review && review.total > 0) {
        const fixed = review.fixed || 0;
        const total = review.total;
        const remaining = total - fixed;
        const percent = total > 0 ? Math.round((fixed / total) * 100) : 0;
        progressHtml = `
          <div class="mistake-progress">
            <div class="row"><span>⚠️ Работа над ошибками</span></div>
            <div class="row">
              <span>Исправлено: <strong>${fixed}</strong></span>
              <span>Осталось: <strong>${remaining}</strong></span>
              <span>Всего ошибок: <strong>${total}</strong></span>
            </div>
            <div class="bar" style="background:color-mix(in srgb, var(--border) 50%, transparent);"><i style="width:${percent}%; background:var(--success);"></i></div>
          </div>
        `;
      }

      const hasNextMistake = reviewingMistakesQueue.length > 0;

      $main.innerHTML = `
        ${progressHtml}
        <div class="card pad">
          <div class="section-title">Тренировка · ${TRAINING_TOPICS.find(t=>t.id===currentTopic)?.name}</div>
          <div class="q-text" style="font-size:15px; margin-bottom:16px;">${escapeHtml(task.text)}</div>
          <label style="font-weight:900;">Ваш ответ</label>
          <input class="input" id="trainAnswer" placeholder="Введите ответ" autocomplete="off">
          <div class="row" style="margin-top:12px; gap:10px;flex-wrap:wrap;">
            <button class="btn primary" id="checkTrainBtn">Проверить</button>
            <button class="btn" id="nextTrainBtn">${hasNextMistake ? '⏩ Следующая ошибка' : '➡️ Следующая'}</button>
            <button class="btn ghost" id="hintTrainBtn">💡 Подсказка</button>
            <button class="btn ghost" id="solutionTrainBtn" style="display:${canShowSolution ? 'inline-flex' : 'none'};">📖 Решение</button>
          </div>
          <div class="hint" id="trainHint">${escapeHtml(task.explanation)}</div>
          <div id="trainSolutionBox" style="display:none;margin-top:10px;">
            <div class="step-solution">
              <div class="step">${escapeHtml(task.explanation)}</div>
            </div>
          </div>
          <div class="sp"></div>
          <button class="btn ghost" id="backTopicsBtn">← К выбору тем</button>
        </div>
      `;

      document.getElementById("checkTrainBtn").onclick = () => {
        const userAns = document.getElementById("trainAnswer").value.trim().replace(',','.').toLowerCase();
        const correct = String(task.answer).toLowerCase();
        if (userAns === correct) {
          toast("✅ Верно!", "Отлично", "ok");
          updateTopicStats(currentTopic, true);
          if (!state.adaptiveStats[currentTopic]) state.adaptiveStats[currentTopic] = { solved: 0, correct: 0 };
          state.adaptiveStats[currentTopic].solved++;
          state.adaptiveStats[currentTopic].correct++;
          saveState(state);

          document.getElementById("trainSolutionBox").style.display = "block";
          document.getElementById("solutionTrainBtn").style.display = "inline-flex";
          document.getElementById("trainHint").classList.remove("show");

          // Исправление ошибки
          if (reviewingMistakeId !== null) {
            if (state.mistakeReview) {
              state.mistakeReview.fixed = (state.mistakeReview.fixed || 0) + 1;
              saveState(state);
            }
            removeMistakeById(reviewingMistakeId);
            updateMiniGoals('mistake');
            toast("Ошибка исправлена ✅", "", "ok");
            reviewingMistakeId = null;

            if (reviewingMistakesQueue.length > 0) {
              const nextMistake = reviewingMistakesQueue.shift();
              reviewingMistakeId = nextMistake.id;
              currentTopic = nextMistake.topicId;
              currentTrainingTask = {
                text: nextMistake.question,
                answer: nextMistake.correctAnswer,
                explanation: nextMistake.explanation,
                topicId: nextMistake.topicId
              };
              window._trainingAttempts = {};
              renderTrainingUI();
              toast("Переход к следующей ошибке", `Осталось ${reviewingMistakesQueue.length}`, "ok");
            } else {
              const review = state.mistakeReview;
              const elapsed = Math.floor((Date.now() - review.startTime) / 1000);
              const minutes = Math.floor(elapsed / 60);
              const seconds = elapsed % 60;
              const timeStr = minutes > 0 ? `${minutes} минут ${seconds} секунд` : `${seconds} секунд`;
              showMistakeComplete(timeStr);
            }
          }
        } else {
          const newAttempts = (window._trainingAttempts[taskKey] || 0) + 1;
          window._trainingAttempts[taskKey] = newAttempts;
          toast("❌ Неверно", "Ошибка записана в раздел «Мои ошибки»", "bad");
          document.getElementById("trainAnswer").classList.add("input-error");
          updateTopicStats(currentTopic, false);
          if (!state.adaptiveStats[currentTopic]) state.adaptiveStats[currentTopic] = { solved: 0, correct: 0 };
          state.adaptiveStats[currentTopic].solved++;
          saveState(state);

          if (reviewingMistakeId === null) {
            addMistake(currentTopic, task.text, task.answer, task.explanation, userAns);
          } else {
            const mistake = state.mistakes.find(m => m.id === reviewingMistakeId);
            if (mistake) {
              mistake.mistakeAttempts = (mistake.mistakeAttempts || 1) + 1;
              saveState(state);
            }
          }
          if (newAttempts >= 3) {
            document.getElementById("solutionTrainBtn").style.display = "inline-flex";
            toast("3 ошибки", "Теперь можно посмотреть решение.", "ok");
          }
          if (newAttempts >= 3) {
            document.getElementById("trainSolutionBox").style.display = "block";
            document.getElementById("trainHint").classList.remove("show");
          }
        }
      };

      // ===== ИСПРАВЛЕННАЯ КНОПКА «Следующая ошибка» =====
      document.getElementById("nextTrainBtn").onclick = () => {
        // Если мы в режиме ошибок (reviewingMistakeId !== null)
        if (reviewingMistakeId !== null) {
          if (reviewingMistakesQueue.length > 0) {
            const nextMistake = reviewingMistakesQueue.shift();
            reviewingMistakeId = nextMistake.id;
            currentTopic = nextMistake.topicId;
            currentTrainingTask = {
              text: nextMistake.question,
              answer: nextMistake.correctAnswer,
              explanation: nextMistake.explanation,
              topicId: nextMistake.topicId
            };
            window._trainingAttempts = {};
            renderTrainingUI();
          } else {
            // Нет больше ошибок — показываем экран завершения
            const review = state.mistakeReview;
            if (review) {
              const elapsed = Math.floor((Date.now() - review.startTime) / 1000);
              const minutes = Math.floor(elapsed / 60);
              const seconds = elapsed % 60;
              const timeStr = minutes > 0 ? `${minutes} минут ${seconds} секунд` : `${seconds} секунд`;
              showMistakeComplete(timeStr);
            } else {
              // fallback
              showMistakeComplete("0 секунд");
            }
          }
          return;
        }

        // Не в режиме ошибок — обычная генерация
        window._trainingAttempts = {};
        generateNewTask();
        renderTrainingUI();
      };

      document.getElementById("hintTrainBtn").onclick = () => {
        document.getElementById("trainHint").classList.toggle("show");
        document.getElementById("trainSolutionBox").style.display = "none";
      };

      document.getElementById("solutionTrainBtn").onclick = () => {
        const box = document.getElementById("trainSolutionBox");
        box.style.display = box.style.display === "none" ? "block" : "none";
        document.getElementById("trainHint").classList.remove("show");
      };

      document.getElementById("backTopicsBtn").onclick = () => {
        currentTopic = null;
        currentTrainingTask = null;
        reviewingMistakeId = null;
        reviewingMistakesQueue = [];
        window._trainingAttempts = {};
        state.mistakeReview = null;
        saveState(state);
        renderTrainingTopicSelector();
      };
    }

    // ---- ПОВТОР ОШИБОК ----
    function startMistakesReview() {
      if (!state.mistakes.length) {
        toast("Нет ошибок", "Все задания решены верно! 🎉", "ok");
        return;
      }
      state.mistakeReview = {
        total: state.mistakes.length,
        fixed: 0,
        startTime: Date.now()
      };
      saveState(state);

      reviewingMistakesQueue = state.mistakes.slice();
      const first = reviewingMistakesQueue.shift();
      reviewingMistakeId = first.id;
      currentTopic = first.topicId;
      currentTrainingTask = {
        text: first.question,
        answer: first.correctAnswer,
        explanation: first.explanation,
        topicId: first.topicId
      };
      window._trainingAttempts = {};
      renderTrainingUI();
      toast("Повтор ошибок", `Осталось ${reviewingMistakesQueue.length + 1} ошибок`, "ok");
    }

    function removeMistakeById(id) {
      state.mistakes = state.mistakes.filter(m => m.id !== id);
      saveState(state);
      if (state.mistakes.length === 0 && !state.achievements.allMistakes) {
        state.achievements.allMistakes = true;
        addNotification("🏆 Достижение", "Все ошибки исправлены!", "#/achievements");
        toast("🏆 Достижение!", "Все ошибки исправлены!", "ok");
        saveState(state);
      }
    }

    function showMistakeComplete(timeStr) {
      const total = state.mistakeReview?.total || 0;
      if (!state.achievements.allMistakes) {
        state.achievements.allMistakes = true;
        addNotification("🏆 Достижение", "Все ошибки исправлены!", "#/achievements");
        toast("🏆 Достижение!", "Все ошибки исправлены!", "ok");
        saveState(state);
      }
      $main.innerHTML = `
        <div class="card pad complete-screen">
          <div class="big-icon">🎉</div>
          <h2>Отлично!</h2>
          <p>Все ошибки исправлены.</p>
          <div style="margin:16px 0;">
            <div>Исправлено ошибок: <strong>${total}</strong></div>
            <div>Потрачено времени: <strong>${timeStr}</strong></div>
          </div>
          <button class="btn primary" style="margin:8px;" id="toSubjectsBtn">Перейти к предметам</button>
          <button class="btn" style="margin:8px;" id="toTrainingBtn">Начать тренировку</button>
        </div>
      `;
      document.getElementById("toSubjectsBtn").addEventListener("click", ()=>{
        state.mistakeReview = null;
        saveState(state);
        go("#/subjects");
      });
      document.getElementById("toTrainingBtn").addEventListener("click", ()=>{
        state.mistakeReview = null;
        saveState(state);
        go("#/subject/inf?tab=training");
      });
    }

    function renderMistakesList() {
      if (!state.mistakes.length) {
        if (state.mistakeReview && state.mistakeReview.total > 0) {
          const elapsed = Math.floor((Date.now() - state.mistakeReview.startTime) / 1000);
          const minutes = Math.floor(elapsed / 60);
          const seconds = elapsed % 60;
          const timeStr = minutes > 0 ? `${minutes} минут ${seconds} секунд` : `${seconds} секунд`;
          showMistakeComplete(timeStr);
          return;
        }
        $main.innerHTML = `<div class="card pad muted">Пока нет ошибок. Пройдите тренировку, и неправильные ответы появятся здесь.</div>`;
        return;
      }

      const grouped = {};
      state.mistakes.forEach(m => {
        if (!grouped[m.topicId]) grouped[m.topicId] = [];
        grouped[m.topicId].push(m);
      });

      const totalMistakes = state.mistakes.length;
      const topicRows = Object.entries(grouped).map(([topicId, items]) => {
        const topicName = TRAINING_TOPICS.find(t=>t.id===topicId)?.name || topicId;
        return `${topicName} (${items.length})`;
      }).join(' · ');

      $main.innerHTML = `
        <div class="section-title">⚠️ Мои ошибки</div>
        <div class="card pad" style="margin-bottom:12px;">
          <div>Всего ошибок: <strong>${totalMistakes}</strong></div>
          <div style="font-size:13px; color:var(--muted);">${topicRows}</div>
        </div>
        <button class="btn primary full" style="margin-bottom:12px;" id="reviewAllMistakes">🔄 Повторить все ошибки</button>
        <div class="list">
          ${Object.entries(grouped).map(([topicId, items]) => {
            const topicName = TRAINING_TOPICS.find(t=>t.id===topicId)?.name || topicId;
            return `
              <div class="card" style="padding:12px;">
                <div style="font-weight:1100;font-size:15px;display:flex;justify-content:space-between;align-items:center;">
                  <span>${escapeHtml(topicName)} (${items.length})</span>
                  <button class="btn small" data-repeat-topic="${topicId}">Повторить тему</button>
                </div>
                ${items.map(m => {
                  const attempts = m.mistakeAttempts || 1;
                  return `
                    <div style="margin-top:8px;padding:8px;border-radius:var(--radius-md);border:1px solid var(--border);">
                      <div style="font-weight:800;font-size:13px;">${escapeHtml(m.question)}</div>
                      <div class="row" style="margin-top:4px;">
                        <span class="chip bad">Ваш: ${escapeHtml(m.userAnswer)}</span>
                        <span class="chip ok">Верно: ${escapeHtml(m.correctAnswer)}</span>
                        <span class="chip">Ошибок: ${attempts}</span>
                      </div>
                      <div class="row" style="margin-top:6px;">
                        <button class="btn small" data-retry="${m.id}">🔁</button>
                        <button class="btn small" data-theory="${m.topicId}">📖 Теория</button>
                        <button class="btn small ghost" data-delete="${m.id}">🗑️</button>
                      </div>
                      <div style="margin-top:6px;padding:6px;background:color-mix(in srgb, var(--brand) 6%, var(--surface));border-radius:10px;font-size:12px;">
                        ${escapeHtml(m.explanation)}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            `;
          }).join('')}
        </div>
      `;

      document.getElementById("reviewAllMistakes")?.addEventListener("click", () => {
        startMistakesReview();
      });

      document.querySelectorAll("[data-repeat-topic]").forEach(btn => {
        btn.addEventListener("click", () => {
          const topicId = btn.getAttribute("data-repeat-topic");
          const mistakes = state.mistakes.filter(m => m.topicId === topicId);
          if (mistakes.length === 0) return;
          reviewingMistakesQueue = mistakes.slice();
          const first = reviewingMistakesQueue.shift();
          reviewingMistakeId = first.id;
          currentTopic = topicId;
          currentTrainingTask = {
            text: first.question,
            answer: first.correctAnswer,
            explanation: first.explanation,
            topicId: topicId
          };
          window._trainingAttempts = {};
          state.mistakeReview = {
            total: mistakes.length,
            fixed: 0,
            startTime: Date.now()
          };
          saveState(state);
          renderTrainingUI();
          toast("Повтор темы", `Тема: ${TRAINING_TOPICS.find(t=>t.id===topicId)?.name}`, "ok");
        });
      });

      document.querySelectorAll("[data-retry]").forEach(btn => {
        btn.onclick = () => {
          const id = btn.getAttribute("data-retry");
          const mistake = state.mistakes.find(m => m.id == id);
          if (mistake) {
            reviewingMistakeId = id;
            currentTopic = mistake.topicId;
            currentTrainingTask = {
              text: mistake.question,
              answer: mistake.correctAnswer,
              explanation: mistake.explanation,
              topicId: mistake.topicId
            };
            window._trainingAttempts = {};
            state.mistakeReview = {
              total: 1,
              fixed: 0,
              startTime: Date.now()
            };
            saveState(state);
            renderTrainingUI();
          }
        };
      });

      document.querySelectorAll("[data-theory]").forEach(btn => {
        btn.addEventListener("click", () => {
          const topicId = btn.getAttribute("data-theory");
          openTheoryByTheme(topicId);
        });
      });

      document.querySelectorAll("[data-delete]").forEach(btn => {
        btn.onclick = () => {
          const id = btn.getAttribute("data-delete");
          state.mistakes = state.mistakes.filter(m => m.id != id);
          saveState(state);
          renderMistakesList();
          toast("Удалено", "", "ok");
        };
      });
    }

    function addMistake(topicId, question, correctAnswer, explanation, userAnswer) {
      const existing = state.mistakes.find(m => m.question === question);
      if (existing) {
        existing.mistakeAttempts = (existing.mistakeAttempts || 1) + 1;
        existing.userAnswer = userAnswer;
        saveState(state);
        return;
      }
      state.mistakes.unshift({
        id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
        topicId, question, correctAnswer, explanation, userAnswer,
        date: new Date().toLocaleString(),
        mistakeAttempts: 1
      });
      if (state.mistakes.length > 100) state.mistakes.pop();
      saveState(state);
      const topic = TRAINING_TOPICS.find(t => t.id === topicId);
      const topicName = topic ? topic.name : topicId;
      addNotification("❌ Ошибка записана", `Тема: ${topicName}`, "#/subject/inf?tab=mistakes");
    }

    // =========================================================
    // СТАРТ
    // =========================================================
    if(!location.hash) location.hash = "#/home";
    route();
    setTimeout(checkAbsence, 1000);
    updateBellBadge();
  </script>
</body>
</html>
